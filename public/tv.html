<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

/* tap overlay */
#tap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>

<div id="tap">Tap to enable audio</div>
<video id="video" playsinline preload="auto"></video>

<script>
const video = document.getElementById("video");
const tap = document.getElementById("tap");

let lastUrl = "";
let isPlayingNow = false;

// enable audio
tap.onclick = () => {
  video.muted = false;
  video.play().then(() => {
    tap.style.display = "none";
  }).catch(()=>{});
};

async function loadState() {
  try {
    const res = await fetch("/state");
    const data = await res.json();

    if (data.url && lastUrl !== data.url) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
      isPlayingNow = false;
    }

    if (data.isPlaying && !isPlayingNow) {
      video.muted = true;
      video.play().then(() => {
        isPlayingNow = true;
      }).catch(()=>{});
    }

    if (!data.isPlaying && isPlayingNow) {
      video.pause();
      isPlayingNow = false;
    }

  } catch (e) {}
}

// smooth polling
setInterval(loadState, 2000);
</script>

</body>
</html>
