<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let sent = false;

// 🔊 unlock audio
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

// 🔥 SYNC LOOP
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // 👉 NEW VIDEO LOAD (FIXED)
    if (data.url && currentUrl !== data.url) {
      currentUrl = data.url;
      sent = false;

      console.log("NEW VIDEO:", currentUrl);

      video.pause();
      video.src = "";

      setTimeout(() => {
        video.src = currentUrl;
        video.load();

        video.play().catch(() => {
          video.muted = true;
          video.play();
        });
      }, 200);
    }

    // ▶ play/pause sync
    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }
}, 1000);


// ✅ VIDEO END DETECT
video.addEventListener("ended", () => {
  if (!sent) {
    sent = true;

    console.log("VIDEO ENDED");

    fetch("/ended", {
      method: "POST"
    });
  }
});
</script>

</body>
</html>
