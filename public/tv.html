<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      width: 100vw;
      height: 100vh;
    }

    .screen {
      width: 100vh;
      height: 100vw;
      transform: rotate(90deg);
      transform-origin: center;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="screen">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let video = document.getElementById("video");

video.muted = false;
video.volume = 1;

/* 🎬 PLAYLIST (ADD YOUR VIDEOS HERE) */
let playlist = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://media.w3.org/2010/05/sintel/trailer.mp4",
  "https://media.w3.org/2010/05/bunny/trailer.mp4"
];

let index = 0;

/* ▶️ PLAY VIDEO */
function playVideo(i) {
  video.src = playlist[i];
  video.play().catch(() => {
    console.log("Tap screen once for play");
  });
}

/* ⏭ AUTO NEXT */
video.onended = () => {
  index++;

  if (index >= playlist.length) {
    index = 0; // loop back
  }

  playVideo(index);
};

/* 🚀 START */
playVideo(index);
</script>

</body>
</html>
