<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  will-change: transform;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted preload="auto"></video>

<script>
const video = document.getElementById("video");

let lastUrl = "";
let lastPlayState = null;

async function loadState() {
  try {
    const res = await fetch("/state");
    const data = await res.json();

    // ✅ change video ONLY when URL changes
    if (data.url && lastUrl !== data.url) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
    }

    // ✅ play/pause only when changed
    if (data.isPlaying !== lastPlayState) {
      lastPlayState = data.isPlaying;

      if (data.isPlaying) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
    }

  } catch (err) {
    console.log("Server issue...");
  }
}

// 🔥 less API calls = smooth playback
setInterval(loadState, 3000);

// debug (optional)
video.addEventListener("waiting", () => {
  console.log("Buffering...");
});

video.addEventListener("playing", () => {
  console.log("Playing...");
});
</script>

</body>
</html>
