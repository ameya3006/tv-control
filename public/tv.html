<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

async function sync() {
  const res = await fetch("/state");
  const data = await res.json();

  // URL change
  if (data.url && video.src !== data.url) {
    video.src = data.url;
    video.load();
  }

  // play/pause
  if (data.isPlaying) {
    video.muted = false; // 🔊 AUDIO FIX
    video.play().catch(()=>{});
  } else {
    video.pause();
  }
}

setInterval(sync, 1000);
</script>

</body>
</html>
