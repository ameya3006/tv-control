<!DOCTYPE html>
<html>
<head>
  <title>Landscape TV</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* 🔥 FORCE LANDSCAPE LOOK */
    .wrap {
      position: fixed;
      top: 0;
      left: 0;

      width: 100vh;   /* swap */
      height: 100vw;  /* swap */

      transform: rotate(90deg);
      transform-origin: center;

      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="wrap">
  <video autoplay controls playsinline>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
