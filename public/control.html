<!DOCTYPE html>
<html>
<head>
  <title>TV Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 15px;
    }

    .box {
      background: #1c1c1c;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add { background: green; color: white; }
    .start { background: blue; color: white; }
    .play { background: orange; color: white; }
    .pause { background: red; color: white; }
    .next { background: purple; color: white; }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #222;
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      word-break: break-all;
    }
  </style>
</head>

<body>

<h1>📺 TV Control Panel</h1>

<div class="box">
  👀 Watching: <span id="count">0</span>
</div>

<div class="box">
  📱 Online Devices
  <ul id="devices"></ul>
</div>

<div class="box">
  <input id="urlInput" placeholder="Paste video URL">
  <br>
  <button class="add" onclick="addVideo()">ADD</button>
  <br>
  <button class="start" onclick="startVideo()">START</button>
  <button class="play" onclick="playVideo()">PLAY</button>
  <button class="pause" onclick="pauseVideo()">PAUSE</button>
  <button class="next" onclick="nextVideo()">NEXT</button>
</div>

<div class="box">
  <h3>Playlist</h3>
  <ul id="playlist"></ul>
</div>

<script>
  // 🔥 MAIN FIX → refresh = clear everything
  localStorage.removeItem("playlist");

  let playlist = [];

  function addVideo() {
    const input = document.getElementById("urlInput");
    const url = input.value;

    if (!url) return;

    playlist.push(url);
    renderList();

    input.value = "";
  }

  function renderList() {
    const ul = document.getElementById("playlist");
    ul.innerHTML = "";

    playlist.forEach(v => {
      const li = document.createElement("li");
      li.textContent = v;
      ul.appendChild(li);
    });
  }

  function startVideo() {
    if (playlist.length === 0) return;

    fetch("/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url: playlist[0] })
    });
  }

  function playVideo() {
    fetch("/play", { method: "POST" });
  }

  function pauseVideo() {
    fetch("/pause", { method: "POST" });
  }

  function nextVideo() {
    if (playlist.length > 0) {
      playlist.shift();
      renderList();

      if (playlist.length > 0) {
        startVideo();
      }
    }
  }
</script>

</body>
</html>
