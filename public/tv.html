<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="v" autoplay muted playsinline></video>

<script>

const API = "https://tv-control.onrender.com";
const video = document.getElementById("v");

let lastUrl = "";

// device id
let TV_ID = localStorage.getItem("tv_id");
if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substring(2,8);
  localStorage.setItem("tv_id", TV_ID);
}

// 🔥 FORCE UNLOCK AUDIO/PLAY (IMPORTANT FIX)
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

// 📺 MAIN LOOP
async function load() {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}`);
    const data = await res.json();

    if (!data.url) return;

    // 🔥 ONLY WHEN URL CHANGES
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.pause();
      video.src = data.url;
      video.load();

      // IMPORTANT DELAY FIX
      setTimeout(() => {
        video.play().catch(err => {
          console.log("PLAY ERROR:", err);
        });
      }, 500);
    }

    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log(e);
  }
}

setInterval(load, 1500);
load();

</script>

</body>
</html>
