<script>

// 🎮 EXISTING CONTROL FUNCTIONS (as it is ठेव)
async function send(action, url=null) {
  await fetch("/control", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ action, url })
  });
}

// ==============================
// 🔥 MAIN DEVICE SYNC (IMPORTANT)
// ==============================
async function loadDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    // 🔥 1. ONLINE COUNT UPDATE
    const onlineCount = data.filter(d => d.status === "ONLINE").length;

    // "Online Devices: X"
    document.querySelectorAll("*").forEach(el => {
      if (el.innerText.includes("Online Devices")) {
        el.innerText = "💻 Online Devices: " + onlineCount;
      }
    });

    // 🔥 2. WATCHING COUNT (same as online)
    document.querySelectorAll("*").forEach(el => {
      if (el.innerText.includes("Watching")) {
        el.innerText = "👀 Watching: " + onlineCount;
      }
    });

    // 🔥 3. USERS TABLE UPDATE
    const tbody = document.querySelector("table tbody");
    if (tbody) {
      tbody.innerHTML = "";

      data.forEach((d, i) => {
        const row = `
          <tr>
            <td>${i + 1}</td>
            <td>${d.name}</td>
            <td>${d.lastSeen}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    console.log("Devices:", data);

  } catch(e) {
    console.log("Device error", e);
  }
}

// 🔁 AUTO REFRESH
setInterval(loadDevices, 2000);

</script>
