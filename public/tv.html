<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE LANDSCAPE */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 🔥 IMPORTANT: muted helps autoplay, later we unmute -->
<video id="video" playsinline autoplay muted></video>

<script>
const video = document.getElementById("video");

let lastState = {
  url: "",
  isPlaying: false
};

// 🔥 unlock audio on first tap (VERY IMPORTANT for mobile)
document.body.addEventListener("click", () => {
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(()=>{});
});

video.volume = 1.0;
video.muted = false;

// 🔥 sync with server
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // URL change
    if (data.url && data.url !== lastState.url) {
      video.src = data.url;
      video.load();
      lastState.url = data.url;
    }

    // PLAY
    if (data.isPlaying && !lastState.isPlaying) {
      video.muted = false;
      video.volume = 1.0;

      video.play().catch((err) => {
        console.log("Play blocked:", err);

        // fallback autoplay safety
        video.muted = true;
        video.play();
      });
    }

    // PAUSE
    if (!data.isPlaying && lastState.isPlaying) {
      video.pause();
    }

    lastState.isPlaying = data.isPlaying;

  } catch (err) {
    console.log("sync error", err);
  }
}, 800);
</script>

</body>
</html>
