<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    /* 🔥 HORIZONTAL FIX */
    video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      object-fit: cover;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

// 🔊 AUDIO FIX
video.muted = false;
video.volume = 1;

// 🔥 AUTO NEXT FIX
video.onended = async () => {
  await fetch("/next");

  // 🔁 force reload
  setTimeout(() => {
    video.src = "";
  }, 200);
};

// 🔁 FETCH LOOP (LOAD FIX INCLUDED)
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      // 🔥 CACHE BREAK FIX
      video.src = data.url + "?t=" + new Date().getTime();

      video.play().catch(() => {
        console.log("User interaction needed");
      });
    }

    if (data.isPlaying) {
      video.play();
    } else {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
