<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>
</head>

<body>

<video id="video" playsinline muted preload="auto"></video>

<script>
const video = document.getElementById("video");

let lastUrl = "";
let isPlayingNow = false;

async function loadState() {
  try {
    const res = await fetch("/state");
    const data = await res.json();

    // ✅ set video only when changed
    if (data.url && lastUrl !== data.url) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
      isPlayingNow = false; // reset
    }

    // ✅ PLAY only once
    if (data.isPlaying && !isPlayingNow) {
      video.play().then(() => {
        isPlayingNow = true;
      }).catch(() => {});
    }

    // ✅ PAUSE only once
    if (!data.isPlaying && isPlayingNow) {
      video.pause();
      isPlayingNow = false;
    }

  } catch (e) {
    console.log("error");
  }
}

// 🔥 slower polling = no flicker
setInterval(loadState, 2000);
</script>

</body>
</html>
