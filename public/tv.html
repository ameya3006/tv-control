<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;color:white;">

<div id="log" style="position:fixed;top:10px;left:10px;font-size:14px;"></div>

<video id="v" playsinline muted
style="width:100vw;height:100vh;object-fit:cover;">
</video>

<script>
const API = window.location.origin;

const video = document.getElementById("v");
const log = document.getElementById("log");

function l(msg){
  log.innerHTML = msg;
  console.log(msg);
}

let lastUrl = "";

// 🔥 Tap to enable audio
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play();
  l("Audio Enabled 🔊");
});

setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    l(JSON.stringify(data));

    if (!data.url) return;

    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
      l("Loaded video");
    }

    if (data.playing) {
      video.play().then(()=>{
        l("Playing ✅");
      }).catch(()=>{
        l("Tap to play ❌");
      });
    } else {
      video.pause();
      l("Paused");
    }

  } catch (e) {
    l("Error fetching");
  }
}, 1000);
</script>

</body>
</html>
