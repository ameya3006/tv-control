<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="video"
       autoplay
       playsinline
       style="width:100%;height:100%;object-fit:cover;">
</video>

<script>
let video = document.getElementById("video");

// 🔄 sync with server
async function sync() {
    try {
        let res = await fetch("/get?t=" + Date.now());
        let data = await res.json();

        if (data.url) {
            if (video.src !== data.url) {
                video.src = data.url;
                video.load();
                video.play().catch(()=>{});
            }

            if (data.isPlaying) {
                video.play().catch(()=>{});
            } else {
                video.pause();
            }
        }
    } catch (e) {}
}

setInterval(sync, 1000);

// 🔥 AUTO NEXT SONG
video.addEventListener("ended", async () => {
    await fetch("/control?cmd=next");
});
</script>

</body>
</html>
