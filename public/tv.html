<!DOCTYPE html>
<html>
<head>
    <title>TV Screen</title>
</head>
<body style="margin:0; background:black;">

<video id="video" width="100%" height="100%" autoplay muted playsinline></video>

<script>
let video = document.getElementById("video");

async function sync() {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        // 👉 IMPORTANT FIX
        if (data.url && video.src !== data.url) {
            video.src = data.url;
            video.load();
        }

        if (data.isPlaying) {
            video.muted = false; // 🔊 SOUND FIX
            video.play().catch(() => {});
        } else {
            video.pause();
        }

    } catch (e) {
        console.log("Error:", e);
    }
}

// 🔁 every 2 sec sync
setInterval(sync, 2000);
</script>

</body>
</html>
