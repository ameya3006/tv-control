<!DOCTYPE html>
<html>
<head>
<title>TV Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.add-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#9333ea,#ec4899);
  color: white;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.controls button {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: bold;
}

.start { background: #22c55e; }
.play { background: #3b82f6; }
.pause { background: #f59e0b; }
.next { background: #a855f7; }

ul { list-style: none; padding: 0; }

li {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 TV Control Panel</h1>

<div class="card">
  <input id="url" placeholder="Paste video URL here...">
  <button class="add-btn" onclick="add()">ADD</button>
</div>

<div class="card controls">
  <button class="start" onclick="start()">START</button>
  <button class="play" onclick="play()">PLAY</button>
  <button class="pause" onclick="pause()">PAUSE</button>
  <button class="next" onclick="next()">NEXT</button>
</div>

<div class="card">
  <h3>📂 Playlist</h3>
  <ul id="list"></ul>
</div>

</div>

<script>
async function add() {
  const url = document.getElementById("url").value.trim();
  if (!url) return;

  await fetch("/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });

  document.getElementById("url").value = "";
  load();
}

function start() { fetch("/start", { method: "POST" }); }
function play() { fetch("/play", { method: "POST" }); }
function pause() { fetch("/pause", { method: "POST" }); }
function next() { fetch("/next", { method: "POST" }); }

async function load() {
  const res = await fetch("/playlist");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((v, i) => {
    const li = document.createElement("li");
    li.innerText = (i + 1) + ". " + v;
    list.appendChild(li);
  });
}

load();
</script>

</body>
</html>
