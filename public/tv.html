<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* 🔥 force landscape look */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* video full screen */
video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

/* tap overlay */
#tap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="tap">👉 Tap to Enable Audio</div>

<video id="video" playsinline preload="auto"></video>

<script>
const video = document.getElementById("video");
const tap = document.getElementById("tap");

let lastUrl = "";
let isPlayingNow = false;

// 🔥 USER TAP REQUIRED FOR AUDIO
tap.addEventListener("click", () => {
  video.muted = false;
  video.play().then(() => {
    tap.style.display = "none";
  }).catch(() => {});
});

async function loadState() {
  try {
    const res = await fetch("/state");
    const data = await res.json();

    // set video only if changed
    if (data.url && lastUrl !== data.url) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
      isPlayingNow = false;
    }

    // play
    if (data.isPlaying && !isPlayingNow) {
      video.muted = true; // autoplay allow
      video.play().then(() => {
        isPlayingNow = true;
      }).catch(()=>{});
    }

    // pause
    if (!data.isPlaying && isPlayingNow) {
      video.pause();
      isPlayingNow = false;
    }

  } catch (e) {
    console.log("error");
  }
}

setInterval(loadState, 2000);
</script>

</body>
</html>
