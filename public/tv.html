<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      width: 100vw;
      height: 100vh;
    }

    /* 🔥 WRAPPER ROTATION FIX */
    .screen {
      width: 100vh;
      height: 100vw;
      transform: rotate(90deg);
      transform-origin: center;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="screen">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let video = document.getElementById("video");

video.muted = false;
video.volume = 1;

video.onended = async () => {
  await fetch("/next");
};

async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      video.src = data.url;
      video.play().catch(()=>{});
    }

    if (data.isPlaying) video.play();
    else video.pause();

  } catch (err) {
    console.log(err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
