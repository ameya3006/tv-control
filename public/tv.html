<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline webkit-playsinline muted
style="
position:fixed;
top:50%;
left:50%;
width:100vh;
height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
object-fit:cover;
background:black;
">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// ✅ जबरदस्त fix: wait until video can play
video.oncanplay = () => {
  video.play().catch(()=>{});
};

// 🔁 server sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ✅ load video safely
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ✅ control play/pause AFTER ready
    if (data.playing && video.readyState >= 3) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("Server error", e);
  }
}, 1000);

// ⏭ next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 enable sound on tap
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
