<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 Rotate video if phone is vertical */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
  background: black;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
let video = document.getElementById("video");

async function sync() {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        if (data.url) {
            if (video.src !== data.url) {
                video.src = data.url;
                video.load();
            }

            if (data.isPlaying) {
                video.play().catch(()=>{});
            } else {
                video.pause();
            }
        }
    } catch (e) {}
}

setInterval(sync, 1000);

// 🔊 unlock audio
document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>

</body>
</html>
