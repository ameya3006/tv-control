<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="v" playsinline controls></video>

<script>

const API = window.location.origin;

let TV_ID = localStorage.getItem("tv_id") || ("TV_" + Math.random().toString(36).substr(2,5));
localStorage.setItem("tv_id", TV_ID);

let TV_NAME = localStorage.getItem("tv_name") || prompt("Enter Device Name");
localStorage.setItem("tv_name", TV_NAME);

const video = document.getElementById("v");
let lastUrl = "";

// 🔥 SIMPLE FETCH LOOP
async function fetchVideo() {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    console.log("DATA:", data);

    if (!data.url) return;

    // 🔥 FORCE LOAD ONLY WHEN CHANGED
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();

      // autoplay attempt
      video.play().catch(err => {
        console.log("Play blocked:", err);
      });
    }

  } catch (e) {
    console.log("ERROR:", e);
  }
}

// 🔥 NO INTERVAL SPAM — SAFE LOOP
setInterval(fetchVideo, 2000);

// 🔊 user interaction unlock
document.body.addEventListener("click", () => {
  video.play().catch(()=>{});
});

</script>

</body>
</html>
