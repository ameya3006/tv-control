<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 Horizontal Video Force */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="v" playsinline muted autoplay></video>

<script>
const API = "";

const video = document.getElementById("v");
let lastUrl = "";

// 🔁 server loop
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    if (!data.url) return;

    // new video load
    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // play / pause
    if (data.playing) {
      video.muted = false;
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {}
}, 1000);

// tap = enable audio
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
