<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain; /* 🔥 horizontal fix */
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<script>
const video = document.getElementById("video");

async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  if (data.url && video.src !== data.url) {
    video.src = data.url;
    video.load();
  }

  if (data.isPlaying) {
    video.muted = true;

    video.play().then(() => {
      setTimeout(() => {
        video.muted = false;
      }, 500);
    }).catch(() => {
      console.log("Tap needed");
    });
  } else {
    video.pause();
  }
}

setInterval(loadState, 1000);
</script>

</body>
</html>
