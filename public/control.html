<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;font-family:sans-serif;text-align:center">

<h1>📺 TV Control Panel</h1>

<!-- 🔥 LIVE VIEWER COUNT -->
<h2>👀 Watching: <span id="count">0</span></h2>

<input id="url" placeholder="Paste video URL"
style="width:60%;padding:12px;border-radius:10px;border:none;">

<button onclick="add()">ADD</button>

<br><br>

<button onclick="start()">START</button>
<button onclick="play()">PLAY</button>
<button onclick="pause()">PAUSE</button>
<button onclick="next()">NEXT</button>

<h3>Playlist</h3>
<ul id="list"></ul>

<script>
const API = window.location.origin;

let playlist = [];

function add() {
  const input = document.getElementById("url");
  const url = input.value;

  if (!url) {
    alert("Enter URL");
    return;
  }

  playlist.push(url);
  render();

  fetch(API + "/add", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ url })
  });

  input.value = "";
}

function render() {
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  playlist.forEach((item, i) => {
    const li = document.createElement("li");
    li.innerText = (i+1) + ". " + item;
    ul.appendChild(li);
  });
}

function start() {
  fetch(API + "/start", { method: "POST" });
}

function play() {
  fetch(API + "/resume", { method: "POST" });
}

function pause() {
  fetch(API + "/pause", { method: "POST" });
}

function next() {
  fetch(API + "/next", { method: "POST" });

  playlist.shift();
  render();
}

// 🔥 LIVE COUNT FETCH
async function loadCount() {
  const res = await fetch(API + "/active-count");
  const data = await res.json();

  document.getElementById("count").innerText = data.active;
}

// हर 2 sec update
setInterval(loadCount, 2000);
</script>

</body>
</html>
