<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 🔥 FULL SCREEN FIX */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 FULL SCREEN VIDEO */
    video {
      position: fixed;
      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      object-fit: cover; /* fills screen properly */
      background: black;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

video.muted = false;
video.volume = 1;

/* 🎬 PLAYLIST */
let playlist = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://media.w3.org/2010/05/sintel/trailer.mp4",
  "https://media.w3.org/2010/05/bunny/trailer.mp4"
];

let index = 0;

/* ▶️ PLAY */
function playVideo(i) {
  video.src = playlist[i];
  video.play().catch(()=>{});
}

/* ⏭ AUTO NEXT */
video.onended = () => {
  index++;

  if (index >= playlist.length) {
    index = 0;
  }

  playVideo(index);
};

/* 🚀 START */
playVideo(index);
</script>

</body>
</html>
