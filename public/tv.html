<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" muted autoplay playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";

async function sync() {
  try {
    const res = await fetch("/video");
    const data = await res.json();

    // 🎬 new video
    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;

      video.src = currentUrl;
      video.load();

      // 👇 IMPORTANT trick
      if (data.playing) {
        video.play().catch(()=>{});
      } else {
        video.pause();
      }
    }

    // ▶ control
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch(e) {
    console.log("error");
  }
}

setInterval(sync, 1000);
</script>

</body>
</html>
