<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

<video id="video" autoplay></video>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://YOUR-RENDER-URL"); 
// 👆 इथे तुझा Render backend URL टाक

const roomId = "room1"; // same room for all TVs

const video = document.getElementById("video");

// join room
socket.emit("join-room", roomId);

// LOAD VIDEO
socket.on("load-video", (url) => {
  video.src = url;
  video.load();
  video.play();
});

// PLAY
socket.on("play", () => {
  video.play();
});

// PAUSE
socket.on("pause", () => {
  video.pause();
});

// NEXT (optional logic)
socket.on("next", () => {
  video.currentTime = 0;
  video.play();
});
</script>

</body>
</html>
