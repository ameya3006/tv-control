<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v"
playsinline
autoplay
muted
style="
position:fixed;
top:50%;
left:50%;
width:100vh;
height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
object-fit:cover;
background:black;
">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";
let isPlaying = false;

setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // 🎬 NEW VIDEO LOAD
    if (data.url && data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();

      isPlaying = false;
    }

    // ▶️ PLAY ONLY WHEN START PRESSED
    if (data.playing && !isPlaying && video.src) {
      await video.play();
      isPlaying = true;
    }

    // ⏸️ PAUSE
    if (!data.playing && isPlaying) {
      video.pause();
      isPlaying = false;
    }

  } catch (e) {}
}, 1000);
</script>

</body>
</html>
