<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain; /* 🔥 correct ratio */
  background: black;
}
</style>
</head>

<body>

<video id="video" controls></video>

<script>
const video = document.getElementById("video");

async function sync() {
  const res = await fetch("/current");
  const data = await res.json();

  if (data.url && video.src !== data.url) {
    video.src = data.url;
  }

  if (data.isPlaying) {
    video.play().catch(() => {
      console.log("Tap required for audio");
    });
  } else {
    video.pause();
  }
}

setInterval(sync, 1500);
</script>

</body>
</html>
