<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let isPlaying = false;
let nextCalled = false;

// 🔥 AUDIO UNLOCK
function unlockAudio() {
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(()=>{});
}
document.body.addEventListener("click", unlockAudio);
document.body.addEventListener("touchstart", unlockAudio);


// 🔥 SYNC LOOP
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && currentUrl !== data.url) {
      currentUrl = data.url;
      nextCalled = false; // reset

      video.pause();
      video.src = data.url;
      video.load();
    }

    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

    isPlaying = data.isPlaying;

  } catch (err) {
    console.log("SYNC ERROR", err);
  }
}, 1000);


// 🔥 NEXT FUNCTION
async function playNext() {
  if (nextCalled) return;
  nextCalled = true;

  console.log("Calling NEXT API...");

  try {
    const res = await fetch("/next");
    const data = await res.json();

    if (!data.url) return;

    currentUrl = data.url;

    video.pause();
    video.removeAttribute("src");
    video.load();

    setTimeout(() => {
      video.src = data.url;
      video.load();

      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }, 300);

  } catch (err) {
    console.log("NEXT ERROR", err);
  }
}


// ✅ ENDED EVENT (🔥 IMPORTANT CHANGE)
video.addEventListener("ended", () => {
  console.log("ENDED EVENT");

  fetch("/status-update"); // 🔥 control ला कळेल video संपलं

  playNext(); // 🔥 next video
});


// ✅ FALLBACK (extra safety)
setInterval(() => {
  if (
    video.duration &&
    video.currentTime >= video.duration - 0.5
  ) {
    console.log("TIME DETECT END");

    fetch("/status-update"); // 🔥 ensure status update

    playNext();
  }
}, 500);

</script>

</body>
</html>
