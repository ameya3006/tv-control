<!DOCTYPE html>
<html>
<head>
  <title>TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vh;      /* 🔥 magic */
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      object-fit: cover;
      background: black;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
  const video = document.getElementById("video");

  let currentUrl = "";
  let isPlaying = false;

  async function fetchVideo() {
    try {
      const res = await fetch("/video");
      const data = await res.json();

      if (data.url && data.url !== currentUrl) {
        currentUrl = data.url;

        video.src = currentUrl;
        video.load();

        video.play().then(() => {
          isPlaying = true;
          console.log("Playing");
        }).catch(() => {
          console.log("Autoplay blocked, tap required");
        });
      }
    } catch (err) {
      console.log("Error fetching video");
    }
  }

  // 🔥 stable loop (NO flicker)
  setInterval(fetchVideo, 3000);

  // 👉 mobile audio fix (tap once)
  document.body.addEventListener("click", () => {
    if (!isPlaying) {
      video.play();
    }
  });

</script>

</body>
</html>
