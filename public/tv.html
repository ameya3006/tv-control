<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* FORCE LANDSCAPE */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
  background: black;
}
</style>
</head>

<body>

<video id="v" autoplay playsinline muted></video>

<!-- DEBUG TEXT -->
<p id="dbg" style="color:white; position:fixed; top:10px; left:10px; font-size:12px;">
Loading...
</p>

<script>
const API = "https://tv-control.onrender.com";
const video = document.getElementById("v");
const dbg = document.getElementById("dbg");

// RESET
const params = new URLSearchParams(window.location.search);
if (params.get("reset")) {
  localStorage.clear();
}

// DEVICE NAME
let TV_NAME = localStorage.getItem("tv_name");
if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name") || "My TV";
  localStorage.setItem("tv_name", TV_NAME);
}

// DEVICE ID
let TV_ID = localStorage.getItem("tv_id");
if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

let lastUrl = "";

// 👉 USER TAP FIX (important)
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

// LOOP
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    dbg.innerText = "URL: " + data.url + " | Playing: " + data.playing;

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.muted = true;
      video.load();

      setTimeout(() => {
        video.play().then(()=>{
          console.log("PLAYED");
        }).catch(()=>{
          console.log("BLOCKED");
        });
      }, 500);
    }

    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    dbg.innerText = "ERROR FETCH";
  }
}, 1500);
</script>

</body>
</html>
