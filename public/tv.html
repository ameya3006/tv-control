<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
}

iframe {
  width: 100vw;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<iframe id="frame"></iframe>

<script>

const API = window.location.origin;

let TV_ID = localStorage.getItem("tv_id") || ("TV_" + Math.random().toString(36).substr(2,5));
localStorage.setItem("tv_id", TV_ID);

let TV_NAME = localStorage.getItem("tv_name") || prompt("Enter Device Name");
localStorage.setItem("tv_name", TV_NAME);

const frame = document.getElementById("frame");
let lastUrl = "";

// 🔥 SIMPLE LOOP
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    console.log("DATA:", data);

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;

      // 🔥 iframe method (browser-safe)
      frame.src = data.url;
    }

  } catch (e) {
    console.log(e);
  }
}, 2000);

</script>

</body>
</html>
