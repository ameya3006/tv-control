<!DOCTYPE html>
<html>
<body style="margin:0;background:black">

<video id="video" muted playsinline
style="width:100vw;height:100vh;object-fit:cover;"></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let lastPlaying = false;

async function sync() {
  const res = await fetch("/video");
  const data = await res.json();

  console.log(data);

  // 🎬 load new video
  if (data.url && data.url !== currentUrl) {
    currentUrl = data.url;
    video.src = currentUrl;
    video.load();
  }

  // ▶ play / pause
  if (data.playing !== lastPlaying) {
    lastPlaying = data.playing;

    if (data.playing) {
      video.play().catch(e => console.log("Play blocked"));
    } else {
      video.pause();
    }
  }
}

setInterval(sync, 1000);
</script>

</body>
</html>
