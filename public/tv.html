<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}

/* 🔥 MESSAGE STYLE */
#msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 28px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<div id="msg"></div>

<script>
const video = document.getElementById("video");
const msg = document.getElementById("msg");

let currentUrl = "";
let isPlaying = false;

// 🔥 AUDIO UNLOCK
function unlockAudio() {
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(()=>{});
}
document.body.addEventListener("click", unlockAudio);
document.body.addEventListener("touchstart", unlockAudio);


// 🔥 SHOW MESSAGE
function showMessage(text) {
  msg.innerText = text;
  msg.style.display = "block";
}

// 🔥 HIDE MESSAGE
function hideMessage() {
  msg.style.display = "none";
}


// 🔥 SYNC LOOP
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // 🔥 new video load
    if (data.url && currentUrl !== data.url) {
      currentUrl = data.url;

      hideMessage(); // remove old message

      video.pause();
      video.src = data.url;
      video.load();
    }

    // PLAY
    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    // PAUSE
    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

    isPlaying = data.isPlaying;

  } catch (err) {
    console.log("SYNC ERROR", err);
  }
}, 1000);


// 🔥 VIDEO END ALERT
video.addEventListener("ended", () => {
  console.log("Video Ended");

  // ✅ popup
  alert("Video Finished! Click Next");

  // ✅ screen message
  showMessage("Video Finished - Click Next ▶");
});

</script>

</body>
</html>
