<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted
style="width:100vw;height:100vh;object-fit:contain;background:black;">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// ✅ play only when ready
video.oncanplay = () => {
  console.log("Ready");
};

// 🔁 sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // load new video
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // control play/pause
    if (data.playing && video.readyState >= 3) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log(e);
  }
}, 1000);

// next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 tap for sound
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
