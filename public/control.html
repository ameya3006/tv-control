<!DOCTYPE html>
<html>
<head>
  <title>TV Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; text-align:center;}
    .box { background:#1c1c1c; margin:10px; padding:10px; border-radius:10px;}
    input { width:80%; padding:10px; border-radius:6px; border:none; }
    button { padding:10px; margin:5px; border:none; border-radius:6px; }
    .add{background:green} .start{background:blue}
    .play{background:orange} .pause{background:red} .next{background:purple}
    li{background:#222;margin:5px;padding:8px;border-radius:5px;}
  </style>
</head>

<body>

<h1>📺 TV Control Panel</h1>

<div class="box">
  👀 Watching: <span id="count">0</span>
</div>

<div class="box">
  📱 Online Devices
  <ul id="devices"></ul>
</div>

<div class="box">
  <input id="urlInput" placeholder="Paste video URL">
  <br>
  <button class="add" onclick="addVideo()">ADD</button><br>
  <button class="start" onclick="startVideo()">START</button>
  <button class="play" onclick="playVideo()">PLAY</button>
  <button class="pause" onclick="pauseVideo()">PAUSE</button>
  <button class="next" onclick="nextVideo()">NEXT</button>
</div>

<div class="box">
  <h3>Playlist</h3>
  <ul id="playlist"></ul>
</div>

<script>
let playlist = [];

// ➕ ADD
function addVideo() {
  const url = document.getElementById("urlInput").value;
  if (!url) return;

  playlist.push(url);
  renderList();

  fetch("/add", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({url})
  });
}

// 🎬 LIST
function renderList() {
  const ul = document.getElementById("playlist");
  ul.innerHTML = "";

  playlist.forEach(v => {
    const li = document.createElement("li");
    li.textContent = v;
    ul.appendChild(li);
  });
}

// ▶ CONTROL
function startVideo(){ fetch("/start",{method:"POST"}) }
function playVideo(){ fetch("/play",{method:"POST"}) }
function pauseVideo(){ fetch("/pause",{method:"POST"}) }
function nextVideo(){ fetch("/next",{method:"POST"}) }

// 🔥 LIVE STATUS
async function loadStatus() {
  const res = await fetch("/status");
  const data = await res.json();

  document.getElementById("count").textContent = data.devices.length;

  const ul = document.getElementById("devices");
  ul.innerHTML = "";

  data.devices.forEach(d => {
    const li = document.createElement("li");
    li.textContent = d.name + " (" + d.id + ")";
    ul.appendChild(li);
  });
}

setInterval(loadStatus, 2000);
loadStatus();
</script>

</body>
</html>
