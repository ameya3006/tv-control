<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted
style="
position:fixed;
top:50%;
left:50%;
width:100vh;
height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
object-fit:contain;
background:black;
">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 sync with server
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // load video
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ✅ ONLY server controls play/pause
    if (data.playing === true && video.readyState >= 3) {
      if (video.paused) {
        video.play().catch(()=>{});
      }
    } else {
      if (!video.paused) {
        video.pause();
      }
    }

  } catch (e) {
    console.log(e);
  }
}, 1000);

// next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 tap ONLY for sound (NO PLAY HERE ❌)
document.body.addEventListener("click", () => {
  video.muted = false;
});
</script>

</body>
</html>
