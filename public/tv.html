<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.tap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="tap" onclick="unlock()"></div>

<script>
const video = document.getElementById("video");

// 🔥 MOBILE FIX
function playVideo() {
  video.muted = true;

  let p = video.play();
  if (p !== undefined) {
    p.then(() => {
      setTimeout(() => {
        video.muted = false;
      }, 500);
    }).catch(()=>{});
  }
}

function unlock() {
  video.muted = false;
  video.play();
  document.querySelector(".tap").style.display = "none";
}

// 🔁 SYNC
async function sync() {
  try {
    const res = await fetch("/current");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      video.src = data.url;
      playVideo();
    }

    if (data.action === "play") video.play();
    if (data.action === "pause") video.pause();

  } catch(e) {}
}

setInterval(sync, 2000);
</script>

</body>
</html>
