<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="video"
playsinline
muted
autoplay
style="width:100%;height:100%;object-fit:cover;">
</video>

<script>
let video = document.getElementById("video");

async function sync() {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        if (data.url) {

            if (video.src !== data.url) {
                video.src = data.url;
                video.load();
            }

            if (data.isPlaying) {
                video.muted = false;
                await video.play().catch(()=>{});
            } else {
                video.pause();
            }
        }

    } catch(e) {
        console.log(e);
    }
}

// fast sync (important)
setInterval(sync, 800);

// 🔥 one tap = enable sound
document.body.addEventListener("click", () => {
    video.muted = false;
    video.play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
