<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE HORIZONTAL VIDEO */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<!-- optional debug -->
<div id="log" style="position:fixed;top:10px;left:10px;color:white;font-size:12px;z-index:999;"></div>

<video id="v" playsinline muted autoplay></video>

<script>
const API = ""; // SAME DOMAIN असल्यास blank ठेव

const video = document.getElementById("v");
const log = document.getElementById("log");

let lastUrl = "";

// debug log
function l(msg){
  log.innerText = msg;
  console.log(msg);
}

// video events
video.onloadeddata = () => l("Loaded ✅");
video.onplay = () => l("Playing ▶");
video.onerror = () => l("Error ❌");

// loop server check
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // show debug (remove if not needed)
    l(JSON.stringify(data));

    if (!data.url) return;

    // new video load
    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
      l("New Video 🎬");
    }

    // play / pause
    if (data.playing) {
      video.muted = false;
      video.play().catch(()=>{
        l("Tap needed ⚠️");
      });
    } else {
      video.pause();
    }

  } catch (e) {
    l("Fetch Error ❌");
  }
}, 1000);

// user tap = enable audio
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
  l("Audio Enabled 🔊");
});
</script>

</body>
</html>
