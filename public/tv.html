<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:black; overflow:hidden; }

video {
  position:fixed;
  top:50%;
  left:50%;
  width:100vh;
  height:100vw;
  transform:translate(-50%, -50%) rotate(90deg);
  object-fit:cover;
}
</style>
</head>

<body>

<video id="v" autoplay playsinline></video>

<script>
const API = window.location.origin;
const video = document.getElementById("v");

// reset
if (new URLSearchParams(location.search).get("reset")) {
  localStorage.clear();
}

// device name
let name = localStorage.getItem("tv_name");
if (!name) {
  name = prompt("Enter Device Name") || "My TV";
  localStorage.setItem("tv_name", name);
}

// id
let id = localStorage.getItem("tv_id");
if (!id) {
  id = "TV_" + Date.now();
  localStorage.setItem("tv_id", id);
}

let lastUrl = "";

setInterval(async () => {
  const res = await fetch(`${API}/video?tv=${id}&name=${encodeURIComponent(name)}`);
  const data = await res.json();

  if (data.url && data.url !== lastUrl) {
    lastUrl = data.url;
    video.src = data.url;
    video.play().catch(()=>{});
  }

  data.playing ? video.play().catch(()=>{}) : video.pause();
}, 1500);
</script>

</body>
</html>
