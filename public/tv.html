<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* big tap button */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 22px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="overlay" id="overlay" onclick="startVideo()">
  ▶ Tap to Play with Sound
</div>

<video id="video" playsinline loop></video>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");

video.src = "https://www.w3schools.com/html/mov_bbb.mp4";

// start function (IMPORTANT FIX)
function startVideo() {
  video.muted = false;   // sound ON
  video.play()
    .then(() => {
      overlay.style.display = "none"; // hide button after play
    })
    .catch(err => {
      console.log("Play failed:", err);
    });
}
</script>

</body>
</html>
