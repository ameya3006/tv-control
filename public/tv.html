<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted
style="width:100vw;height:100vh;object-fit:cover;background:black;">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";
let userStarted = false;

// 👆 USER TAP REQUIRED (mobile unlock)
document.body.addEventListener("click", () => {
  userStarted = true;

  video.muted = false;

  video.play().catch(()=>{});
});

// 🔁 server sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ❌ no URL = clear screen
    if (!data.url) {
      video.pause();
      video.removeAttribute("src");
      lastUrl = "";
      return;
    }

    // 🔄 load new video
    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ▶️ ONLY play when BOTH conditions true
    if (data.playing && userStarted) {
      if (video.readyState >= 3) {
        video.play().catch(()=>{});
      }
    } else {
      video.pause();
    }

  } catch (e) {}
}, 1000);
</script>

</body>
</html>
