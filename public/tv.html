<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>
</head>

<body style="margin:0; background:black; color:white; text-align:center;">

  <h2>TV SCREEN</h2>

  <div id="screen" style="font-size:40px;">
    Waiting...
  </div>

  <script>
    async function loadData() {
      try {
        let res = await fetch("/data");
        let text = await res.text();

        document.getElementById("screen").innerText = text;
      } catch (e) {
        document.getElementById("screen").innerText = "Connection Error ❌";
      }
    }

    setInterval(loadData, 1000);
    loadData();
  </script>

</body>
</html>
