<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let endedSent = false;

// 🔊 unlock audio
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

// 🔥 SYNC
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && currentUrl !== data.url) {
      currentUrl = data.url;
      endedSent = false;

      video.pause();
      video.src = data.url;
      video.load();
    }

    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }
}, 1000);


// 🔥 END DETECT (TIME BASED)
setInterval(() => {
  if (
    video.duration &&
    video.currentTime >= video.duration - 0.3 &&
    !endedSent
  ) {
    endedSent = true;

    console.log("VIDEO ENDED → SERVER");

    fetch("/ended", { method: "POST" });
  }
}, 500);

</script>

</body>
</html>
