<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<!-- ❌ controls काढले -->
<video id="v" autoplay playsinline></video>

<script>

const API = window.location.origin;
const video = document.getElementById("v");

// ❌ USER INTERACTION BLOCK (SUPER IMPORTANT)
video.addEventListener("click", e => e.preventDefault());
video.controls = false;

// 🔒 Disable all manual control
video.onpause = () => {
  if (!window.allowPause) {
    video.play().catch(()=>{});
  }
};

let lastUrl = "";

// 🔁 SERVER CONTROL ONLY
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video`);
    const data = await res.json();

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();
      video.play().catch(()=>{});
    }

    // 🔥 ONLY SERVER CONTROL
    if (data.playing) {
      window.allowPause = false;
      video.play().catch(()=>{});
    } else {
      window.allowPause = true;
      video.pause();
    }

  } catch (e) {}
}, 1500);

</script>

</body>
</html>
