<!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">

<video id="video" width="100%" height="100%" autoplay playsinline></video>

<script>
const video = document.getElementById("video");

// 🔊 AUTO SOUND ENABLE (NO BUTTON)
document.body.addEventListener("click", () => {
    video.muted = false;
    video.volume = 1;
    video.play();
}, { once: true });

// 🔁 SYNC WITH SERVER
setInterval(async () => {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        if (data.url && video.src !== data.url) {
            video.src = data.url;
            video.load();
        }

        if (data.isPlaying) {
            video.play().catch(()=>{});
        } else {
            video.pause();
        }
    } catch(e) {}
}, 1000);
</script>

</body>
</html>
