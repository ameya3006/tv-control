<!DOCTYPE html>
<html>
<head>
  <title>TV Control Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    input {
      padding: 12px;
      width: 60%;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background: #00ccaa;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 8px;
      padding: 8px;
      background: #222;
      border-radius: 5px;
    }
  </style>

</head>
<body>

<h1>🎮 TV Control Panel</h1>

<h2>Add Video</h2>
<input type="text" id="videoUrl" placeholder="Enter video URL">
<br>
<button onclick="addVideo()">➕ Add</button>

<h2>Controls</h2>
<button onclick="startPlaylist()">▶ Start</button>
<button onclick="play()">▶ Play</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="next()">⏭ Next</button>

<h2>Playlist</h2>
<ul id="playlist"></ul>

<script>
let playlist = [];
let index = 0;

// ➕ Add video
function addVideo() {
  const url = document.getElementById("videoUrl").value;
  if (url) {
    playlist.push(url);
    renderPlaylist();
    document.getElementById("videoUrl").value = "";
  }
}

// 📋 Show playlist
function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";
  playlist.forEach((video, i) => {
    const li = document.createElement("li");
    li.textContent = video;

    // 🔥 highlight current
    if (i === index) {
      li.style.background = "#00ffcc";
      li.style.color = "black";
    }

    list.appendChild(li);
  });
}

// ▶ Start playlist
async function startPlaylist() {
  index = 0;
  renderPlaylist();

  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      url: playlist[index],
      action: "play"
    })
  });
}

// ▶ Play
async function play() {
  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "play" })
  });
}

// ⏸ Pause
async function pause() {
  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "pause" })
  });
}

// ⏭ Next
async function next() {
  index++;
  if (index >= playlist.length) index = 0;

  renderPlaylist();

  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      url: playlist[index],
      action: "play"
    })
  });
}
</script>

</body>
</html>
