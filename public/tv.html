<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="v" controls autoplay playsinline></video>

<script>

const API = window.location.origin;
const video = document.getElementById("v");

// 🔥 DEVICE NAME LOGIC (FINAL)
let TV_NAME = localStorage.getItem("tv_name");

if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name");

  if (!TV_NAME) {
    TV_NAME = "My TV";
  }

  localStorage.setItem("tv_name", TV_NAME);
}

// 🔥 UNIQUE TV ID
let TV_ID = localStorage.getItem("tv_id");

if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

let lastUrl = "";

// 🔁 FETCH LOOP
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    console.log("DATA:", data);

    if (!data.url) return;

    // 🔥 LOAD NEW VIDEO
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.pause();
      video.src = data.url;
      video.load();

      video.play().catch(e => console.log("Play error:", e));
    }

    // ▶ PLAY / PAUSE CONTROL
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("ERR:", e);
  }
}, 1500);

</script>

</body>
</html>
