<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: rotate(90deg); /* 🔥 force landscape */
    }

    .tap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<video id="video" playsinline></video>
<div class="tap" onclick="startVideo()"></div>

<script>
let video = document.getElementById("video");

let lastUrl = "";
let isPlayingNow = false;

// 🔥 USER TAP REQUIRED FOR AUDIO
function startVideo() {
  video.play().then(() => {
    video.muted = false;
  }).catch(()=>{});
}

// 🔥 SYNC LOOP
setInterval(async () => {
  try {
    let res = await fetch("/state");
    let data = await res.json();

    // 🎬 NEW VIDEO LOAD
    if (data.url && lastUrl !== data.url) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();

      isPlayingNow = false;
      video.muted = false; // 🔥 fix audio
    }

    // ▶ PLAY
    if (data.isPlaying && !isPlayingNow) {
      video.play().then(() => {
        isPlayingNow = true;

        setTimeout(() => {
          video.muted = false;
        }, 200);

      }).catch(()=>{});
    }

    // ⏸ PAUSE
    if (!data.isPlaying && isPlayingNow) {
      video.pause();
      isPlayingNow = false;
    }

  } catch(e) {}
}, 1000);
</script>

</body>
</html>
