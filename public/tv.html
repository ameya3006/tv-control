<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let lastUrl = "";

// 🔥 USER TAP REQUIRED (important for TV)
document.body.addEventListener("click", () => {
  video.muted = false;
});

// 🔥 SYNC
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // 👉 URL CHANGE (NEXT FIX)
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      console.log("NEW VIDEO:", lastUrl);

      video.pause();

      video.src = lastUrl;
      video.load();

      if (data.isPlaying) {
        video.play().catch(() => {
          video.muted = true;
          video.play();
        });
      }
    }

    // ▶ play/pause control
    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }
}, 1000);


// ✅ END DETECT
video.addEventListener("ended", () => {
  console.log("ENDED");
  fetch("/ended", { method: "POST" });
});
</script>

</body>
</html>
