<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<script>
let video = document.getElementById("video");

video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
video.muted = true;
video.volume = 0;

video.play().catch(()=>{});
</script>

</body>
</html>
