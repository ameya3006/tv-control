<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* 🔥 full screen crop */
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

// 🔊 SOUND FIX
video.muted = false;
video.volume = 1;

// ⏭ AUTO NEXT
video.onended = async () => {
  await fetch("/next");
};

// 🔁 LOAD VIDEO LOOP
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    console.log("DATA:", data); // debug

    if (data.url && video.src !== data.url) {
      video.src = data.url;

      video.play()
      .then(() => {
        console.log("Playing...");
      })
      .catch(() => {
        console.log("Click once on TV screen");
      });
    }

    if (data.isPlaying) {
      video.play();
    } else {
      video.pause();
    }

  } catch (err) {
    console.log("Error:", err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
