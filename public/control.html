<!DOCTYPE html>
<html>
<head>
  <title>TV Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1220, #111827);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #0f172a;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .top {
      display: flex;
      gap: 10px;
    }

    .box {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
    }

    /* 🔥 BUTTON ROW */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .controls button {
      flex: 0 0 auto;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .play { background: #22c55e; }
    .pause { background: #ef4444; }
    .next { background: #3b82f6; }
    .restart { background: #f97316; }
    .start { background: #8b5cf6; }

    .add-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }

    .add-btn {
      background: #22c55e;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: left;
    }

    .btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .blue { background: #3b82f6; }
    .red { background: #ef4444; }
  </style>
</head>

<body>

<h1>📺 TV Control Panel</h1>

<!-- TOP -->
<div class="card top">
  <div class="box">👀 Watching: <span id="watching">0</span></div>
  <div class="box">💻 Online Devices: <span id="devices">0</span></div>
</div>

<!-- CONTROLS -->
<div class="card">
  <h3>🎮 CONTROLS</h3>

  <div class="controls">
    <button class="play" onclick="playCurrent()">▶ PLAY</button>
    <button class="pause" onclick="send('pause')">⏸ PAUSE</button>
    <button class="next" onclick="nextVideo()">⏭ NEXT</button>
    <button class="restart" onclick="send('restart')">🔁 RESTART</button>
    <button class="start" onclick="send('start')">⏮ START</button>
  </div>
</div>

<!-- ADD URL -->
<div class="card">
  <h3>➕ ADD VIDEO URL</h3>

  <div class="add-box">
    <input id="url" placeholder="Paste MP4 URL">
    <button class="add-btn" onclick="addVideo()">ADD</button>
  </div>
</div>

<!-- PLAYLIST -->
<div class="card">
  <h3>📜 PLAYLIST</h3>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>VIDEO URL</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="playlist"></tbody>
  </table>
</div>

<!-- USERS -->
<div class="card">
  <h3>📊 USERS ANALYTICS</h3>

  <table>
    <thead>
      <tr>
        <th>DEVICE</th>
        <th>LAST SEEN</th>
      </tr>
    </thead>
    <tbody id="users"></tbody>
  </table>
</div>

<script>

let list = [];
let current = 0;

function send(action, url="") {
  fetch("/control", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({action, url})
  });
}

function addVideo() {
  const url = document.getElementById("url").value.trim();
  if (!url) return;

  list.push(url);
  render();
}

function playCurrent() {
  if (list.length === 0) return;
  send("play", list[current]);
}

function nextVideo() {
  if (list.length === 0) return;
  current = (current + 1) % list.length;
  send("play", list[current]);
}

function removeVideo(i) {
  list.splice(i,1);
  render();
}

function render() {
  const box = document.getElementById("playlist");
  box.innerHTML = "";

  list.forEach((v,i)=>{
    box.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${v}</td>
        <td>
          <button class="btn blue" onclick="send('play','${v}')">▶ PLAY</button>
          <button class="btn red" onclick="removeVideo(${i})">🗑 REMOVE</button>
        </td>
      </tr>
    `;
  });
}

function timeAgo(t){
  return Math.floor((Date.now()-t)/1000)+" sec ago";
}

async function load() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    document.getElementById("watching").innerText = data.length;
    document.getElementById("devices").innerText = data.length;

    const box = document.getElementById("users");
    box.innerHTML = "";

    data.forEach(d=>{
      box.innerHTML += `
        <tr>
          <td>${d.name}</td>
          <td>${timeAgo(d.lastSeen)}</td>
        </tr>
      `;
    });

  } catch {
    document.getElementById("watching").innerText = 0;
    document.getElementById("devices").innerText = 0;
  }
}

setInterval(load,1000);

</script>

</body>
</html>
