<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
  background: black;
}
</style>
</head>

<body>

<video id="v" playsinline></video>

<script>
const API = "https://tv-control.onrender.com";
const video = document.getElementById("v");

// RESET
const params = new URLSearchParams(window.location.search);
if (params.get("reset")) {
  localStorage.clear();
}

// DEVICE NAME
let TV_NAME = localStorage.getItem("tv_name");
if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name") || "My TV";
  localStorage.setItem("tv_name", TV_NAME);
}

// DEVICE ID
let TV_ID = localStorage.getItem("tv_id");
if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

let lastUrl = "";

// 🔥 SINGLE TAP = LOAD + PLAY
document.body.addEventListener("click", async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
    }

    video.muted = false;
    video.play().catch(()=>{});

  } catch (e) {
    console.log("ERR:", e);
  }
});

// 🔁 BACKGROUND SYNC (no autoplay)
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;
      video.src = data.url;
      video.load();
    }

    if (!data.playing) {
      video.pause();
    }

  } catch (e) {}
}, 2000);
</script>

</body>
</html>
