<!DOCTYPE html>
<html>
<head>
  <title>TV Control Panel</title>
</head>
<body>

<h1>🎮 TV Control Panel</h1>

<h2>Add Video</h2>
<input type="text" id="videoUrl" placeholder="Enter video URL">
<button onclick="addVideo()">Add</button>

<h2>Controls</h2>
<button onclick="startPlaylist()">Start Playlist</button>
<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="next()">Next</button>

<h2>Playlist</h2>
<ul id="playlist"></ul>

<script>
let playlist = [];
let index = 0;

// ➕ Add video
function addVideo() {
  const url = document.getElementById("videoUrl").value;
  if (url) {
    playlist.push(url);
    renderPlaylist();
  }
}

// 📋 Show playlist
function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";
  playlist.forEach((video, i) => {
    const li = document.createElement("li");
    li.textContent = video;
    list.appendChild(li);
  });
}

// ▶ Start playlist
async function startPlaylist() {
  index = 0;
  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      url: playlist[index],
      action: "play"
    })
  });
}

// ▶ Play
async function play() {
  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "play" })
  });
}

// ⏸ Pause
async function pause() {
  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "pause" })
  });
}

// ⏭ Next
async function next() {
  index++;
  if (index >= playlist.length) index = 0;

  await fetch("/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      url: playlist[index],
      action: "play"
    })
  });
}
</script>

</body>
</html>
