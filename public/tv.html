<!DOCTYPE html>
<html>
<head>
    <title>TV Screen</title>
</head>
<body style="margin:0; background:black; text-align:center;">

<video id="video" width="100%" autoplay></video>

<!-- ONE TIME CLICK FOR SOUND -->
<button onclick="enableSound()" 
style="position:absolute; top:10px; left:10px; padding:10px; z-index:10;">
🔊 Enable Sound
</button>

<script>
let video = document.getElementById("video");

// 🔊 enable sound
function enableSound() {
    video.muted = false;
    video.volume = 1;
    video.play();
}

// 🔁 fetch from server
setInterval(() => {
    fetch("/get")
    .then(res => res.json())
    .then(data => {

        if (data.url && video.src !== data.url) {
            video.src = data.url;
            video.load();

            video.muted = false;   // important
            video.volume = 1;

            if (data.isPlaying) {
                video.play().catch(()=>{});
            }
        }

        if (data.isPlaying) {
            video.play().catch(()=>{});
        } else {
            video.pause();
        }

    });
}, 2000);
</script>

</body>
</html>
