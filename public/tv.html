<!DOCTYPE html>
<html>
<body style="margin:0;background:black">

<video id="v"
style="width:100vw;height:100vh;object-fit:cover"></video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 sync with server
setInterval(async () => {
  const res = await fetch(API + "/video");
  const data = await res.json();

  // ✅ load video (no autoplay)
  if (data.url && data.url !== lastUrl) {
    video.src = data.url;
    video.load();
    lastUrl = data.url;
  }

  // ✅ play/pause control
  if (data.playing) {
    video.play().catch(()=>{});
  } else {
    video.pause();
  }

}, 1000);

// 👉 auto next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 IMPORTANT: enable audio on first tap
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
