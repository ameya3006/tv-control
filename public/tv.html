<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#startBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px 40px;
  font-size: 20px;
}
</style>
</head>

<body>

<button id="startBtn">START</button>
<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("startBtn");

let started = false;
let lastUrl = "";

// 🔥 START (audio unlock)
btn.onclick = () => {
  started = true;
  btn.style.display = "none";

  video.muted = false;
  video.play().catch(() => {
    video.muted = true;
    video.play();
  });
};

// 🔥 FAST SYNC + CACHE BYPASS
setInterval(async () => {
  if (!started) return;

  try {
    const res = await fetch("/get?t=" + Date.now());
    const data = await res.json();

    // 👉 NEXT VIDEO FIX
    if (data.url && data.url !== lastUrl) {
      lastUrl = data.url;

      console.log("NEW VIDEO:", lastUrl);

      video.pause();
      video.src = "";
      video.load();

      setTimeout(() => {
        video.src = lastUrl + "?t=" + Date.now();
        video.load();

        video.play().catch(() => {
          video.muted = true;
          video.play();
        });
      }, 200);
    }

  } catch (e) {
    console.log(e);
  }
}, 500);

// END
video.addEventListener("ended", () => {
  fetch("/ended", { method: "POST" });
});
</script>

</body>
</html>
