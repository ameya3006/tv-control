<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted
style="width:100vw;height:100vh;object-fit:cover;background:black;">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";
let hasStarted = false;

// 🎬 play only when ready
function safePlay() {
  video.play().then(() => {
    console.log("PLAYED");
  }).catch(() => {
    console.log("PLAY BLOCKED");
  });
}

// 🎯 IMPORTANT: play when video ready
video.addEventListener("canplay", () => {
  if (hasStarted) {
    safePlay();
  }
});

// 🔁 server sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ❌ no URL → do nothing
    if (!data.url) return;

    // 🎥 new video load
    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
      hasStarted = false;
    }

    // ▶️ START pressed
    if (data.playing === true) {
      hasStarted = true;
      safePlay();
    } else {
      video.pause();
      hasStarted = false;
    }

  } catch (e) {}
}, 1000);

// 📱 tap for audio (mobile restriction)
document.body.addEventListener("click", () => {
  video.muted = false;
  safePlay();
});
</script>

</body>
</html>
