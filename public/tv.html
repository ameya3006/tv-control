<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 Horizontal Video */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="v" playsinline muted autoplay></video>

<script>
const API = "";

// 🔥 UNIQUE ID
let TV_ID = localStorage.getItem("tv_id");
if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

// 🔥 NAME
let TV_NAME = localStorage.getItem("tv_name");
if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name (Phone / Hall / Bedroom)");
  localStorage.setItem("tv_name", TV_NAME);
}

const video = document.getElementById("v");
let lastUrl = "";

// 🔁 LOOP
setInterval(async () => {
  try {
    const res = await fetch(API + "/video?tv=" + TV_ID + "&name=" + encodeURIComponent(TV_NAME));
    const data = await res.json();

    if (!data.url) return;

    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    if (data.playing) {
      video.muted = false;
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {}
}, 1000);

// 🔊 enable sound
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
