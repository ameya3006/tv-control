<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* portrait phone → force landscape */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: contain;
  background: black;
}

/* landscape mode → normal */
@media (orientation: landscape) {
  video {
    width: 100vw;
    height: 100vh;
    transform: translate(-50%, -50%) rotate(0deg);
  }
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
const video = document.getElementById("video");
let currentUrl = "";

// autoplay fix (tap for sound if needed)
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

async function sync() {
  try {
    const res = await fetch(window.location.origin + "/current");
    const data = await res.json();

    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;
      video.src = currentUrl;
      video.load();
    }

    if (data.isPlaying) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(sync, 1500);
</script>

</body>
</html>
