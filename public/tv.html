<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE LANDSCAPE VIEW */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let lastState = {
  url: "",
  isPlaying: false
};

// 🔥 fast sync with server
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // URL change
    if (data.url && data.url !== lastState.url) {
      video.src = data.url;
      video.load();
      lastState.url = data.url;
    }

    // PLAY
    if (data.isPlaying && !lastState.isPlaying) {
      video.play().catch(()=>{});
    }

    // PAUSE
    if (!data.isPlaying && lastState.isPlaying) {
      video.pause();
    }

    lastState.isPlaying = data.isPlaying;

  } catch (err) {
    console.log("sync error", err);
  }
}, 800);
</script>

</body>
</html>
