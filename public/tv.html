<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE LANDSCAPE MODE */
video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let lastState = {
  url: "",
  isPlaying: false
};

// 🔥 AUDIO UNLOCK (IMPORTANT FOR MOBILE)
function unlockAudio() {
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(()=>{});
}

document.body.addEventListener("click", unlockAudio);
document.body.addEventListener("touchstart", unlockAudio);

// default audio
video.muted = false;
video.volume = 1.0;

// 🔥 SYNC LOOP (SERVER STATE)
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // URL change
    if (data.url && data.url !== lastState.url) {
      video.src = data.url;
      video.load();
      lastState.url = data.url;
    }

    // PLAY
    if (data.isPlaying && !lastState.isPlaying) {
      video.muted = false;

      const playPromise = video.play();

      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // fallback
          video.muted = true;
          video.play();
        });
      }
    }

    // PAUSE
    if (!data.isPlaying && lastState.isPlaying) {
      video.pause();
    }

    lastState.isPlaying = data.isPlaying;

  } catch (err) {
    console.log("sync error", err);
  }
}, 800);


// 🔥🔥 AUTO NEXT VIDEO (MAIN FIX)
video.addEventListener("ended", async () => {
  console.log("Video ended → next");

  try {
    const res = await fetch("/next");
    const data = await res.json();

    if (data.url) {
      video.src = data.url;
      video.load();

      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }
  } catch (err) {
    console.log("Next error", err);
  }
});

</script>

</body>
</html>
