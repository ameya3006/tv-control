<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;

      /* center video */
      display: flex;
      justify-content: center;
      align-items: center;

      width: 100vw;
      height: 100vh;
    }

    /* 🔥 LANDSCAPE FIX */
    video {
      width: 100vh;   /* swap trick */
      height: 100vw;
      object-fit: cover;

      /* rotate so phone vertical -> video horizontal */
      transform: rotate(90deg);
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

// sound
video.muted = false;
video.volume = 1;

// next video trigger
video.onended = async () => {
  await fetch("/next");
};

// main loop
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      video.src = data.url;

      video.play().catch(() => {
        console.log("Tap screen once");
      });
    }

    if (data.isPlaying) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
