<!DOCTYPE html>
<html>
<head>
  <title>TV Control</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      width: 60%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .controls {
      margin-top: 10px;
    }

    .playlist {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>📺 TV Control Panel</h1>

<h3>👀 Watching: <span id="count">0</span></h3>

<h4>📱 Online Devices</h4>
<div id="devices"></div>

<br>

<input id="url" placeholder="Paste video URL">
<button onclick="addVideo()">ADD</button>

<div class="controls">
  <button onclick="startVideo()">START</button>
  <button onclick="playVideo()">PLAY</button>
  <button onclick="pauseVideo()">PAUSE</button>
  <button onclick="nextVideo()">NEXT</button>
</div>

<div class="playlist">
  <h3>Playlist</h3>
  <ol id="list"></ol>
</div>

<script>

const API = window.location.origin;

// 🔁 FETCH STATUS
async function load() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    // 👀 watching count
    document.getElementById("count").innerText = data.devices?.length || 0;

    // 📱 devices list
    const dev = document.getElementById("devices");
    dev.innerHTML = "";
    (data.devices || []).forEach(d => {
      const el = document.createElement("div");
      el.innerText = d.name + " (" + d.id + ")";
      dev.appendChild(el);
    });

    // 🎵 playlist
    const list = document.getElementById("list");
    list.innerHTML = "";
    (data.playlist || []).forEach((v, i) => {
      const li = document.createElement("li");
      li.innerText = v;
      list.appendChild(li);
    });

  } catch (e) {
    console.log(e);
  }
}

setInterval(load, 2000);

// ➕ ADD VIDEO
function addVideo() {
  const url = document.getElementById("url").value;
  if (!url) return alert("URL टाक 😄");

  fetch(API + "/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url })
  });
}

// ▶ START
function startVideo() {
  fetch(API + "/start", { method: "POST" });
}

// ▶ PLAY
function playVideo() {
  fetch(API + "/resume", { method: "POST" });
}

// ⏸ PAUSE
function pauseVideo() {
  fetch(API + "/pause", { method: "POST" });
}

// ⏭ NEXT
function nextVideo() {
  fetch(API + "/next", { method: "POST" });
}

</script>

</body>
</html>
