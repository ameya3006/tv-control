<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:black;">

<video id="v" autoplay muted playsinline
style="width:100vw;height:100vh;"></video>

<script>

const v = document.getElementById("v");

// video load
async function load() {
  try {
    let res = await fetch("/current");
    let data = await res.json();

    if (data.url && v.src !== data.url) {
      v.src = data.url;
      v.play().catch(()=>{});
    }
  } catch {}
}

setInterval(load, 2000);

// 🔥🔥🔥 MAIN FIX
function ping() {
  fetch("/ping", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: navigator.userAgent   // UNIQUE DEVICE 🔥
    })
  }).catch(()=>{});
}

// 🔥 PAGE LOAD ला लगेच ping
ping();

// 🔥 repeat ping
setInterval(ping, 2000);

</script>

</body>
</html>
