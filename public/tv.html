<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
  background: black;
}

#startBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  background: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<button id="startBtn">Start</button>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("startBtn");

let currentUrl = "";
let lastState = false;

// 🔁 fetch loop
async function sync() {
  try {
    const res = await fetch("/video");
    const data = await res.json();

    // 🎬 new video
    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;
      video.src = currentUrl;
      video.load();
    }

    // ▶️ play/pause sync
    if (data.playing !== lastState) {
      lastState = data.playing;

      if (data.playing) {
        video.play().catch(()=>{});
      } else {
        video.pause();
      }
    }

  } catch(e) {
    console.log("error");
  }
}

setInterval(sync, 2000);

// 👇 REQUIRED for mobile audio
btn.onclick = () => {
  video.muted = false;

  video.play().then(() => {
    btn.style.display = "none";
  }).catch(() => {
    alert("Tap again");
  });
};
</script>

</body>
</html>
