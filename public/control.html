<!DOCTYPE html>
<html>
<head>
  <title>Control</title>
</head>
<body style="font-family:sans-serif">

<h2>Enter Video URL</h2>

<input id="url" type="text" placeholder="Paste video URL" style="width:80%">
<button onclick="playVideo()">Play</button>

<h3>Playlist:</h3>
<ul id="list"></ul>

<script>
const API = "https://tv-control.onrender.com";

function playVideo() {
  const url = document.getElementById("url").value;

  if (!url) {
    alert("Enter URL");
    return;
  }

  fetch(API + "/play", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url: url })
  })
  .then(() => {
    addToList(url);
    document.getElementById("url").value = "";
  })
  .catch(err => {
    alert("Error sending request");
    console.log(err);
  });
}

function addToList(url) {
  const li = document.createElement("li");
  li.textContent = url;
  document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
