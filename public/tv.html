<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* tap overlay for mobile */
.tap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="tap" onclick="unlockAudio()"></div>

<script>
const video = document.getElementById("video");

// 🔥 FORCE PLAY (mobile autoplay fix)
function forcePlay() {
  video.muted = true;

  let p = video.play();

  if (p !== undefined) {
    p.then(() => {
      // after autoplay, try unmute
      setTimeout(()=>{
        video.muted = false;
      }, 500);
    }).catch(()=>{
      console.log("Autoplay blocked");
    });
  }
}

// 🔥 USER TAP = ENABLE AUDIO
function unlockAudio() {
  video.muted = false;
  video.play();
  document.querySelector(".tap").style.display = "none";
}

// 🔥 LOAD VIDEO
function loadVideo(url) {
  if (!url) return;
  video.src = url;
  forcePlay();
}

// 🔥 CONTROL EVENTS FROM SERVER
async function listen() {
  try {
    const res = await fetch("/current");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      loadVideo(data.url);
    }

    if (data.action === "play") video.play();
    if (data.action === "pause") video.pause();

  } catch(e) {
    console.log("Server not responding");
  }
}

// 🔁 LOOP
setInterval(listen, 2000);
</script>

</body>
</html>
