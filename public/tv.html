<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>

<video id="video" autoplay></video>

<script>
let video = document.getElementById("video");

// 🔊 SOUND FIX
video.muted = false;
video.volume = 1;

// 🔁 AUTO NEXT
video.onended = async () => {
  await fetch("/next");
};

// 🔄 FETCH LOOP
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {

      // smooth transition
      video.style.opacity = 0;

      setTimeout(() => {
        video.src = data.url;

        video.play()
        .then(() => {
          console.log("Playing...");
        })
        .catch(() => {
          console.log("Click required on TV once");
        });

        video.style.opacity = 1;
      }, 300);
    }

    if (data.isPlaying) {
      video.play();
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("Error:", e);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
