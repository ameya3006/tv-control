<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#startBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<button id="startBtn">Tap to Start</button>
<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("startBtn");

let currentUrl = "";
let lastState = false;

async function sync() {
  const res = await fetch("/video");
  const data = await res.json();

  // new video
  if (data.url && data.url !== currentUrl) {
    currentUrl = data.url;
    video.src = currentUrl;
    video.load();
  }

  // play/pause
  if (data.playing !== lastState) {
    lastState = data.playing;

    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }
  }
}

setInterval(sync, 2000);

// mobile audio fix
btn.onclick = () => {
  video.muted = false;
  video.play().then(() => {
    btn.style.display = "none";
  });
};
</script>

</body>
</html>
