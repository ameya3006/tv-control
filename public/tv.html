<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="video"
autoplay
playsinline
muted
style="width:100%;height:100%;object-fit:cover;">
</video>

<script>
let video = document.getElementById("video");

// 🔥 try auto unmute after small delay (best possible hack)
setTimeout(() => {
    video.muted = false;
    video.play().catch(()=>{});
}, 2000);

// 🔥 fallback: first touch anywhere = enable sound
document.body.addEventListener("touchstart", () => {
    video.muted = false;
    video.play().catch(()=>{});
}, { once: true });

setInterval(async () => {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        // 👉 load video
        if (data.url && video.getAttribute("data-src") !== data.url) {
            video.src = data.url;
            video.setAttribute("data-src", data.url);
            video.load();
        }

        // 👉 control from laptop
        if (data.isPlaying) {
            video.play().catch(()=>{});
        } else {
            video.pause();
        }

    } catch (e) {
        console.log(e);
    }
}, 1000);
</script>

</body>
</html>
