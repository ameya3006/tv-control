<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Control Panel</h2>

<input type="text" id="url" placeholder="Paste MP4 URL here">

<br>

<button onclick="play()">▶ Play</button>
<button onclick="pause()">⏸ Pause</button>

<!-- 🔥 hidden device container (UI disturb nahi honar) -->
<div id="devices" style="display:none;"></div>

<script>

// 🎮 SEND CONTROL
async function send(action, url=null) {
  await fetch("/control", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ action, url })
  });
}

// ▶ PLAY
function play() {
  const url = document.getElementById("url").value;
  if (!url) {
    alert("Enter video URL");
    return;
  }
  send("play", url);
}

// ⏸ PAUSE
function pause() {
  send("pause");
}

// 📡 DEVICE TRACK (NO UI CHANGE)
async function loadDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    console.log("Devices:", data);

    // optional internal update (hidden)
    const container = document.getElementById("devices");
    container.innerHTML = JSON.stringify(data);

  } catch(e) {
    console.log("Device fetch error");
  }
}

// 🔁 run every 2 sec
setInterval(loadDevices, 2000);

</script>

</body>
</html>
