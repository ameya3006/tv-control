<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted autoplay
style="width:100vw;height:100vh;object-fit:cover;">
</video>

<script>
const API = "";

const video = document.getElementById("v");

let lastUrl = "";

setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    if (!data.url) return;

    // load new video
    if (data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // play / pause
    if (data.playing) {
      video.muted = false;
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {}
}, 1000);

// enable audio on tap
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
