<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">

<video id="video" playsinline autoplay muted
style="width:100%;height:100%;object-fit:cover;">
</video>

<script>
let video = document.getElementById("video");

// 👉 first user interaction fix (autoplay unblock)
document.body.addEventListener("click", () => {
    video.muted = false;
    video.play().catch(()=>{});
});

setInterval(async () => {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        // 👉 set video
        if (data.url && video.src !== data.url) {
            video.src = data.url;
            video.load();
        }

        // 👉 control play/pause
        if (data.isPlaying) {
            video.play().then(() => {
                video.muted = false; // 🔥 sound ON
            }).catch(()=>{});
        } else {
            video.pause();
        }

    } catch (e) {
        console.log("Error:", e);
    }
}, 1000);
</script>

</body>
</html>
