<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}

#msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 28px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<video id="video" playsinline></video>
<div id="msg"></div>

<script>
const video = document.getElementById("video");
const msg = document.getElementById("msg");

let currentUrl = "";
let isEndedShown = false;

// 🔊 audio unlock
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});


// 🔥 show message
function showMessage(text) {
  msg.innerText = text;
  msg.style.display = "block";
}

// 🔥 hide message
function hideMessage() {
  msg.style.display = "none";
}


// 🔥 SYNC
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && currentUrl !== data.url) {
      currentUrl = data.url;
      isEndedShown = false;

      hideMessage();

      video.pause();
      video.src = data.url;
      video.load();
    }

    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

  } catch (err) {
    console.log("SYNC ERROR", err);
  }
}, 1000);


// 🔥 END DETECTION (MAIN FIX)
setInterval(() => {
  if (
    video.duration &&
    video.currentTime >= video.duration - 0.3 &&
    !isEndedShown
  ) {
    console.log("Video Finished");

    isEndedShown = true;

    alert("Video Finished! Click Next");
    showMessage("Video Finished - Click Next ▶");
  }
}, 500);

</script>

</body>
</html>
