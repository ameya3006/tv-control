<!DOCTYPE html>
<html>
<body style="background:#0b132b;color:white">

<h1>TV Control Panel</h1>

<input id="url" placeholder="Paste video URL" style="width:60%">
<button onclick="add()">ADD</button>

<br><br>

<button onclick="start()">START</button>
<button onclick="play()">PLAY</button>
<button onclick="pause()">PAUSE</button>

<script>
const API = "";

// फक्त URL save
function add() {
  fetch(API + "/set", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      url: document.getElementById("url").value
    })
  });
}

// START = play true
function start() {
  fetch(API + "/start", { method: "POST" });
}

function play() {
  fetch(API + "/resume", { method: "POST" });
}

function pause() {
  fetch(API + "/pause", { method: "POST" });
}
</script>

</body>
</html>
