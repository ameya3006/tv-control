<!DOCTYPE html>
<html>
<head>
  <title>Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 15px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .play { background: #00c853; }
    .pause { background: #d50000; }
    .restart { background: #ff6d00; }
    .next { background: #2962ff; }

    .playlist {
      margin-top: 20px;
    }

    .item {
      background: #1e1e1e;
      padding: 10px;
      margin-top: 6px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }

    .item:hover {
      background: #333;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count {
      font-size: 16px;
      color: #00e676;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>🎬 Control</h2>
  <div class="count">Watching: <span id="watchingCount">0</span></div>
</div>

<input id="videoUrl" placeholder="Paste MP4 URL here">

<div class="controls">
  <button class="play" onclick="playVideo()">▶ Play</button>
  <button class="next" onclick="nextVideo()">⏭ Next</button>
  <button class="pause" onclick="pauseVideo()">⏸ Pause</button>
  <button class="restart" onclick="restartVideo()">🔁 Restart</button>
</div>

<div class="playlist" id="playlist"></div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Device</th>
      <th>Last Seen</th>
    </tr>
  </thead>
  <tbody id="usersTable"></tbody>
</table>

<script>

// 🎮 CONTROL API
async function send(action, url="") {
  await fetch("/control", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({action, url})
  });
}

// 🎬 PLAYLIST
let list = [];
let currentIndex = 0;

function playVideo() {
  const url = document.getElementById("videoUrl").value.trim();
  if (!url) return;

  list.push(url);
  currentIndex = list.length - 1;

  renderPlaylist();
  send("play", url);
}

function nextVideo() {
  if (list.length === 0) return;

  currentIndex++;
  if (currentIndex >= list.length) currentIndex = 0;

  send("play", list[currentIndex]);
}

function pauseVideo() {
  send("pause");
}

function restartVideo() {
  send("restart");
}

function renderPlaylist() {
  const box = document.getElementById("playlist");
  box.innerHTML = "";

  list.forEach((url, i) => {
    box.innerHTML += `
      <div class="item" onclick="send('play','${url}')">
        ${i+1}. ${url}
      </div>
    `;
  });
}

// ⏱ TIME AGO
function timeAgo(ts) {
  return Math.floor((Date.now() - ts)/1000) + " sec ago";
}

// 📊 DEVICES
async function loadDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    document.getElementById("watchingCount").innerText = data.length;

    const table = document.getElementById("usersTable");
    table.innerHTML = "";

    data.forEach((d,i)=>{
      table.innerHTML += `
        <tr>
          <td>${i+1}</td>
          <td>${d.name}</td>
          <td>${timeAgo(d.lastSeen)}</td>
        </tr>
      `;
    });

  } catch {
    document.getElementById("watchingCount").innerText = 0;
  }
}

setInterval(loadDevices, 1000);

</script>

</body>
</html>
