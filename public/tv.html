<!DOCTYPE html>
<html>
<head>
  <title>TV Player</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* FULL SCREEN FIX */
    video {
      position: fixed;
      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      object-fit: cover;
      background: black;
    }

    /* START BUTTON (IMPORTANT FOR AUDIO) */
    #start {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="start">Tap to Start ▶</div>

<video id="video" playsinline></video>

<script>
let video = document.getElementById("video");

let playlist = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://media.w3.org/2010/05/sintel/trailer.mp4",
  "https://media.w3.org/2010/05/bunny/trailer.mp4"
];

let index = 0;

/* PLAY VIDEO */
function playVideo(i) {
  video.src = playlist[i];
  video.play();
}

/* AUTO NEXT */
video.onended = () => {
  index++;
  if (index >= playlist.length) index = 0;
  playVideo(index);
};

/* 🔥 IMPORTANT: USER CLICK REQUIRED FOR AUDIO */
document.getElementById("start").addEventListener("click", () => {
  document.getElementById("start").style.display = "none";

  video.muted = false;
  video.volume = 1;

  playVideo(index);
});
</script>

</body>
</html>
