<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline muted
style="
position:fixed;
top:50%;
left:50%;
width:100vh;
height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
object-fit:contain;
background:black;
">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";
let userInteracted = false; // 🔥 MAIN FIX

// 🔁 server sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // load video
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ❗ BEFORE USER TAP → DO NOTHING
    if (!userInteracted) return;

    // ✅ control after interaction
    if (data.playing === true && video.readyState >= 3) {
      if (video.paused) {
        video.play().catch(()=>{});
      }
    } else {
      if (!video.paused) {
        video.pause();
      }
    }

  } catch (e) {
    console.log(e);
  }
}, 1000);

// next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 👆 FIRST TAP = UNLOCK SYSTEM
document.body.addEventListener("click", () => {
  if (!userInteracted) {
    userInteracted = true;
    video.muted = false;
  }
});
</script>

</body>
</html>
