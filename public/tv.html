<!DOCTYPE html>
<html>
<body style="margin:0;background:black">

<video id="video"
muted
autoplay
playsinline
style="width:100vw;height:100vh;object-fit:cover;">
</video>

<script>
const video = document.getElementById("video");

let currentUrl = "";

async function sync() {
  try {
    const res = await fetch("/video");
    const data = await res.json();

    console.log("DATA:", data);

    // 🎬 new video load
    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;

      video.src = currentUrl;
      video.load();

      // 💥 FORCE PLAY (main fix)
      setTimeout(() => {
        video.play().catch(e => console.log("Play blocked:", e));
      }, 300);
    }

    // ▶ control
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch(e) {
    console.log("ERROR:", e);
  }
}

setInterval(sync, 1000);
</script>

</body>
</html>
