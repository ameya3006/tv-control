<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline
style="
position:fixed;
top:50%;
left:50%;
max-width:100vh;
max-height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
background:black;
">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 server sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ✅ load video
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ✅ play / pause
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("error", e);
  }
}, 1000);

// ⏭ next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 audio enable
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
