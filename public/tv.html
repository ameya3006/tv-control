<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<script>
let video = document.getElementById("video");

// ✅ ALWAYS MUTED (autoplay fix)
video.muted = true;

// 🔥 USER TAP = UNMUTE
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play();
});

// 🔥 AUTO NEXT
video.onended = async () => {
  await fetch("/next");
};

// 🔁 LOAD LOOP
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      video.src = data.url;

      await video.play().catch(() => {
        console.log("Autoplay blocked");
      });
    }

    if (data.isPlaying) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
