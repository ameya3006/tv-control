<!DOCTYPE html>
<html>
<head>
  <title>Test Video</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      font-size: 20px;
      z-index: 10;
    }
  </style>
</head>

<body>

<button onclick="start()">START VIDEO</button>

<video id="v" playsinline></video>

<script>
let v = document.getElementById("v");

function start() {
  v.src = "https://www.w3schools.com/html/mov_bbb.mp4";

  v.muted = false;
  v.volume = 1;

  v.play()
  .then(()=> console.log("PLAYING"))
  .catch(e => console.log("ERROR:", e));
}
</script>

</body>
</html>
