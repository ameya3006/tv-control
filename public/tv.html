<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>
</head>

<body style="margin:0; background:black; text-align:center;">

<video id="video" width="100%" height="100%" controls autoplay></video>

<script>
const server = "https://tv-control.onrender.com";

async function loadVideo() {
    let res = await fetch(server + "/get");
    let data = await res.json();

    let video = document.getElementById("video");

    if (data.url) {
        if (video.src !== data.url) {
            video.src = data.url;
        }

        if (data.isPlaying) {
            video.play();
        } else {
            video.pause();
        }
    }
}

setInterval(loadVideo, 2000);
loadVideo();
</script>

</body>
</html>
