<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline webkit-playsinline
style="width:100vw;height:100vh;object-fit:contain;background:black;">
</video>

<script>
const video = document.getElementById("v");

let lastUrl = "";
let isPlaying = false;

setInterval(async () => {
  const res = await fetch("/video");
  const data = await res.json();

  // 🎬 load only if URL exists
  if (data.url && data.url !== lastUrl) {
    video.src = data.url;
    video.load();
    lastUrl = data.url;
    isPlaying = false;
  }

  // ❌ if no video → clear screen
  if (!data.url) {
    video.removeAttribute("src");
    video.load();
    lastUrl = "";
    return;
  }

  // ▶️ play नियंत्रण
  if (data.playing && !isPlaying) {
    video.play().then(() => {
      isPlaying = true;
    }).catch(()=>{});
  }

  // ⏸ pause
  if (!data.playing && isPlaying) {
    video.pause();
    isPlaying = false;
  }

}, 1000);

// 🔊 sound enable (no autoplay)
document.body.addEventListener("click", () => {
  video.muted = false;
});
</script>

</body>
</html>
