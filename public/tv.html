<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline webkit-playsinline
style="width:100vw;height:100vh;object-fit:contain;background:black;">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 sync
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ✅ ALWAYS load video first
    if (data.url && data.url !== lastUrl) {
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    // ⚠️ play only if ready
    if (data.playing && video.readyState >= 2) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch(e) {
    console.log(e);
  }
}, 1000);

// ⏭ next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 audio fix (MANDATORY for mobile)
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});
</script>

</body>
</html>
