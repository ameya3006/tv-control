<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v"
style="
position:fixed;
top:50%;
left:50%;
width:100vh;
height:100vw;
transform:translate(-50%, -50%) rotate(90deg);
object-fit:cover;
background:black;
"
playsinline
></video>

<script>
const API = ""; // same domain
const video = document.getElementById("v");

let lastUrl = "";
let hasStarted = false;

// 🔁 sync with server
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    // ❌ no video → do nothing
    if (!data.url) return;

    // 🎬 new video load
    if (data.url !== lastUrl) {
      video.src = data.url;
      lastUrl = data.url;
      hasStarted = false;
    }

    // ▶️ START / PLAY
    if (data.playing && !hasStarted) {
      hasStarted = true;

      // IMPORTANT: force play
      video.muted = false;

      const playPromise = video.play();

      if (playPromise !== undefined) {
        playPromise.catch(() => {
          console.log("Autoplay blocked, waiting for tap");
        });
      }
    }

    // ⏸️ PAUSE
    if (!data.playing && !video.paused) {
      video.pause();
    }

  } catch (e) {
    console.log("error", e);
  }
}, 1000);

// 👇 USER TAP REQUIRED (mobile fix)
document.body.addEventListener("click", () => {
  video.play();
});
</script>

</body>
</html>
