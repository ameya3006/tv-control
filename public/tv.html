<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Full screen video */
video {
  position: absolute;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
const video = document.getElementById("video");

async function loadVideo() {
  const res = await fetch("/current");
  const data = await res.json();

  if (data.url && video.src !== data.url) {
    video.src = data.url;
    video.play().catch(()=>{});
  }
}

// keep checking for new video
setInterval(loadVideo, 2000);

// auto next when video ends
video.addEventListener("ended", () => {
  fetch("/ended", { method: "POST" });
});
</script>

</body>
</html>
