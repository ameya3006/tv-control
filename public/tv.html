<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">

<video id="v" playsinline webkit-playsinline
style="width:100vw;height:100vh;object-fit:contain;background:black;">
</video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 sync
setInterval(async () => {
  const res = await fetch(API + "/video");
  const data = await res.json();

  // 🎬 load video ONLY (no autoplay)
  if (data.url && data.url !== lastUrl) {
    video.src = data.url;
    video.load();
    lastUrl = data.url;
  }

  // 🎮 control play/pause ONLY from server
  if (data.playing === true) {
    video.play().catch(()=>{});
  } else {
    video.pause();
  }

}, 1000);

// ⏭ next
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};

// 🔊 user tap → only enable audio (NOT autoplay)
document.body.addEventListener("click", () => {
  video.muted = false;
});
</script>

</body>
</html>
