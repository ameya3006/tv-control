<!DOCTYPE html>
<html>
<head>
  <title>Control</title>
</head>
<body style="font-family:sans-serif">

<h2>Enter Video URL</h2>

<input id="url" type="text" placeholder="Paste video URL" style="width:80%">
<button onclick="playVideo()">Play</button>

<h3>Playlist:</h3>
<ul id="list"></ul>

<script>
const API = "https://tv-control.onrender.com";

// 🔥 load existing video on refresh
window.onload = () => {
  fetch(API + "/video")
    .then(res => res.json())
    .then(data => {
      if (data.url) addToList(data.url);
    });
};

function playVideo() {
  const urlInput = document.getElementById("url");
  const url = urlInput.value.trim();

  if (!url) {
    alert("Enter URL");
    return;
  }

  fetch(API + "/play", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url: url })
  })
  .then(() => {
    addToList(url);   // 🔥 UI update
    urlInput.value = "";
  })
  .catch(err => {
    console.log(err);
    alert("Error");
  });
}

// 🔥 FIXED FUNCTION
function addToList(url) {
  const list = document.getElementById("list");

  const li = document.createElement("li");
  li.innerText = url;

  list.appendChild(li);
}
</script>

</body>
</html>
