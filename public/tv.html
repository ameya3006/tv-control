<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

// 🔥 autoplay fix
video.muted = true;
video.volume = 1;

// 🔥 auto next
video.onended = async () => {
  await fetch("/next");
};

// 🔁 fetch loop
async function loadVideo() {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
      video.src = data.url;

      video.play().catch(() => {
        console.log("User interaction needed");
      });
    }

    if (data.isPlaying) {
      video.play();
    } else {
      video.pause();
    }

  } catch (err) {
    console.log(err);
  }

  setTimeout(loadVideo, 1000);
}

loadVideo();
</script>

</body>
</html>
