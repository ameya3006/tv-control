<!DOCTYPE html>
<html>
<head>
  <title>TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      object-fit: cover;
      background: black;
    }

    /* tap to start button */
    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 25px;
      font-size: 18px;
      background: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button id="startBtn">Start Video</button>

<video id="video" playsinline></video>

<script>
  const video = document.getElementById("video");
  const btn = document.getElementById("startBtn");

  let currentUrl = "";

  async function fetchVideo() {
    try {
      const res = await fetch("/video");
      const data = await res.json();

      if (data.url && data.url !== currentUrl) {
        currentUrl = data.url;

        video.src = currentUrl;
        video.load();
      }
    } catch (e) {
      console.log("fetch error");
    }
  }

  // fetch every 3 sec
  setInterval(fetchVideo, 3000);

  // 🔥 REQUIRED for mobile audio + playback
  btn.onclick = () => {
    video.play()
      .then(() => {
        btn.style.display = "none";
      })
      .catch(() => {
        alert("Tap again");
      });
  };

</script>

</body>
</html>
