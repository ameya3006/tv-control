<!DOCTYPE html>
<html>
<head>
  <title>TV</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
let video = document.getElementById("video");

video.src = "https://www.w3schools.com/html/mov_bbb.mp4";

video.muted = false;
video.volume = 1;

video.play().catch(()=>{});
</script>

</body>
</html>
