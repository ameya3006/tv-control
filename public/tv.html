<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<video id="video" width="100%" height="100%" autoplay playsinline></video>

<script>
const video = document.getElementById("video");

// 🔁 Fetch video from server
async function loadVideo() {
    const res = await fetch("/get");
    const data = await res.json();

    if (data.url && video.src !== data.url) {
        video.src = data.url;
        video.load();
    }

    if (data.isPlaying) {
        video.play().catch(() => {});
    } else {
        video.pause();
    }
}

// ⏱ refresh every 1 sec
setInterval(loadVideo, 1000);

// 🔊 ONE TIME SOUND ENABLE (NO TOGGLE)
document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });

</script>

</body>
</html>
