<!DOCTYPE html>
<html>
<head>
  <title>TV Control Panel</title>
</head>

<body>

<h2>📱 TV Control Panel</h2>

<input id="url" placeholder="Enter video URL">
<button onclick="add()">Add</button>

<br><br>

<button onclick="start()">Start ▶</button>
<button onclick="play()">Play ▶</button>
<button onclick="pause()">Pause ⏸</button>
<button onclick="next()">Next ⏭</button>

<h3 id="status">Loading...</h3>

<h3>Playlist</h3>
<ul id="list"></ul>

<script>

// ADD VIDEO
async function add() {
  const url = document.getElementById("url").value;

  if (!url) return;

  await fetch("/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url })
  });

  document.getElementById("url").value = "";

  load(); // 🔥 IMPORTANT
}

// START
function start() {
  fetch("/start", { method: "POST" });
}

// PLAY
function play() {
  fetch("/play", { method: "POST" });
}

// PAUSE
function pause() {
  fetch("/pause", { method: "POST" });
}

// NEXT
function next() {
  fetch("/next", { method: "POST" });
}

// LOAD PLAYLIST
async function load() {
  try {
    const res = await fetch("/playlist");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = "<li>No videos</li>";
      return;
    }

    data.forEach((v, i) => {
      const li = document.createElement("li");
      li.innerText = (i + 1) + ". " + v;
      list.appendChild(li);
    });

  } catch (e) {
    document.getElementById("list").innerHTML = "<li>Server error</li>";
  }
}

// STATUS
setInterval(async () => {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    if (data.ended) {
      document.getElementById("status").innerText = "⚠️ Finished!";
    } else if (data.isPlaying) {
      document.getElementById("status").innerText = "▶ Playing...";
    } else {
      document.getElementById("status").innerText = "⏸ Paused";
    }
  } catch {
    document.getElementById("status").innerText = "Server error";
  }
}, 1000);

// INIT LOAD
load();

</script>

</body>
</html>
