<!DOCTYPE html>
<html>
<head>
  <title>Control Panel</title>
</head>

<body>

<h2>📱 Control Panel</h2>

<button onclick="next()">Next ▶</button>

<h3 id="status">Loading...</h3>

<script>

// ▶ NEXT
function next() {
  fetch("/next");
}

// 🔥 STATUS
setInterval(async () => {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    if (data.ended) {
      document.getElementById("status").innerText = "⚠️ Video Finished! Click Next";
    } else {
      document.getElementById("status").innerText = "▶ Playing...";
    }

  } catch (err) {
    console.log(err);
  }
}, 1000);

</script>

</body>
</html>
