<!DOCTYPE html>
<html>
<head>
  <title>Control</title>
</head>
<body>

<h2>Enter Video URL</h2>

<input id="url" type="text" placeholder="Paste video URL">
<button onclick="playVideo()">Play</button>

<h3>Playlist:</h3>
<ul id="list"></ul>

<script>
const API = "https://tv-control.onrender.com";

function playVideo() {
  const url = document.getElementById("url").value.trim();

  if (!url) return;

  // 👉 backend ला send
  fetch(API + "/play", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url: url })
  });

  // 👉 UI मध्ये लगेच add (MAIN FIX)
  const li = document.createElement("li");
  li.textContent = url;
  document.getElementById("list").appendChild(li);

  document.getElementById("url").value = "";
}
</script>

</body>
</html>
