<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* 🔥 FULL SCREEN CONTAINER */
    .container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    /* 🎬 VIDEO FIX */
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;  /* 🔥 horizontal proper view */
      background: black;
    }
  </style>
</head>

<body>

<div class="container">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let video = document.getElementById("video");

/* 🎬 PLAYLIST */
let playlist = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://media.w3.org/2010/05/sintel/trailer.mp4",
  "https://media.w3.org/2010/05/bunny/trailer.mp4"
];

let index = 0;

/* ▶️ PLAY VIDEO */
function playVideo(i) {
  video.src = playlist[i];

  video.muted = false;
  video.volume = 1;

  video.play().catch(() => {
    console.log("Tap screen once if audio blocked");
  });
}

/* ⏭ AUTO NEXT */
video.onended = () => {
  index++;
  if (index >= playlist.length) index = 0;
  playVideo(index);
};

/* 🚀 START */
playVideo(index);
</script>

</body>
</html>
