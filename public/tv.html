<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
const video = document.getElementById("video");

let lastUrl = "";

// 🔥 FAST SYNC (important)
setInterval(async () => {
  try {
    const res = await fetch("/get?t=" + Date.now()); // cache bypass
    const data = await res.json();

    if (data.url && data.url !== lastUrl) {
      lastUrl = data.url;

      console.log("NEW VIDEO:", lastUrl);

      // 🔥 HARD RESET (important)
      video.pause();
      video.removeAttribute("src");
      video.load();

      setTimeout(() => {
        video.src = lastUrl + "?t=" + Date.now(); // cache bust
        video.load();

        video.play().catch(() => {
          video.muted = true;
          video.play();
        });
      }, 100);
    }

  } catch (e) {
    console.log(e);
  }
}, 500); // faster polling


// 🔥 END EVENT
video.addEventListener("ended", () => {
  fetch("/ended", { method: "POST" });
});
</script>

</body>
</html>
