<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.tap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="tap" id="tap">👉 Tap to Play with Sound</div>

<video id="video" playsinline loop></video>

<script>
const video = document.getElementById("video");
const tap = document.getElementById("tap");

video.src = "https://www.w3schools.com/html/mov_bbb.mp4";

// IMPORTANT: force muted first (browser rule)
video.muted = true;

function start() {
  video.play().then(() => {

    // NOW enable sound AFTER play starts
    setTimeout(() => {
      video.muted = false;
    }, 200);

    tap.style.display = "none";

  }).catch(err => {
    console.log("Error:", err);
  });
}

tap.addEventListener("click", start);
</script>

</body>
</html>
