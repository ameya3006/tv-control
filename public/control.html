<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Control Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
}

.container { padding: 20px; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.play { background: #28a745; color: white; }
.pause { background: #dc3545; color: white; }
.next { background: #007bff; color: white; }
.restart { background: #fd7e14; color: white; }

input {
  width: 80%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.addBtn {
  padding: 10px 15px;
  background: #28a745;
  color: white;
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.playlist-item {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📺 TV Control Panel</h2>

<div class="card">
  <span id="watching">👀 Watching: 0</span>
  &nbsp;&nbsp;&nbsp;
  <span id="online">💻 Online Devices: 0</span>
</div>

<div class="card">
  <h3>🎮 Controls</h3>
  <button class="play" onclick="play()">▶ Play</button>
  <button class="pause" onclick="pause()">⏸ Pause</button>
  <button class="next" onclick="nextVideo()">⏭ Next</button>
  <button class="restart" onclick="restart()">🔄 Restart</button>
</div>

<div class="card">
  <h3>➕ Add Video URL</h3>
  <input type="text" id="url" placeholder="Paste video URL">
  <button class="addBtn" onclick="addToPlaylist()">ADD</button>
</div>

<div class="card">
  <h3>📜 Playlist</h3>
  <div id="playlist"></div>
</div>

<div class="card">
  <h3>📋 Users Analytics</h3>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>User</th>
        <th>Last Seen</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
</div>

</div>

<script>

// 🎯 PLAYLIST ARRAY
let playlist = [];
let currentIndex = 0;

// ➕ ADD TO PLAYLIST
function addToPlaylist() {
  const url = document.getElementById("url").value;
  if (!url) return alert("Enter URL");

  playlist.push(url);
  renderPlaylist();

  document.getElementById("url").value = "";
}

// 📜 RENDER PLAYLIST
function renderPlaylist() {
  const div = document.getElementById("playlist");
  div.innerHTML = "";

  playlist.forEach((url, i) => {
    div.innerHTML += `
      <div class="playlist-item">
        ${i+1}. ${url}
      </div>
    `;
  });
}

// ▶ PLAY CURRENT
function play() {
  if (playlist.length === 0) return alert("Add video first");

  send("play", playlist[currentIndex]);
}

// ⏸ PAUSE
function pause() {
  send("pause");
}

// ⏭ NEXT
function nextVideo() {
  if (playlist.length === 0) return;

  currentIndex++;
  if (currentIndex >= playlist.length) currentIndex = 0;

  send("play", playlist[currentIndex]);
}

// 🔄 RESTART
function restart() {
  send("restart");
}

// 📡 API
async function send(action, url=null) {
  await fetch("/control", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ action, url })
  });
}

// 🔢 COUNTS
function updateCounts(count) {
  document.getElementById("watching").innerText = "👀 Watching: " + count;
  document.getElementById("online").innerText = "💻 Online Devices: " + count;
}

// 📡 DEVICES
async function loadDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    const online = data.filter(d => d.status === "ONLINE");

    updateCounts(online.length);

    const table = document.getElementById("usersTable");
    table.innerHTML = "";

    online.forEach((d, i) => {
      table.innerHTML += `
        <tr>
          <td>${i+1}</td>
          <td>${d.name}</td>
          <td>${d.lastSeen}</td>
        </tr>
      `;
    });

  } catch(e) {
    updateCounts(0);
  }
}

// 🔁 AUTO REFRESH
setInterval(loadDevices, 2000);

</script>

</body>
</html>
