<!DOCTYPE html>
<html>
<head>
  <title>TV</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* 🔥 LANDSCAPE FORCE WRAPPER */
    .wrap {
      position: fixed;
      top: 0;
      left: 0;

      width: 100vh;
      height: 100vw;

      background: black;

      /* 🔥 IMPORTANT FIX */
      transform: rotate(-90deg) translateX(-100vw);
      transform-origin: top left;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="wrap">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let video = document.getElementById("video");

video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
video.muted = false;
video.volume = 1;

video.play().catch(()=>{});
</script>

</body>
</html>
