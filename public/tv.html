<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="v" playsinline autoplay muted></video>

<script>

const API = window.location.origin;

let TV_ID = localStorage.getItem("tv_id");
if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

let TV_NAME = localStorage.getItem("tv_name");
if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name");
  localStorage.setItem("tv_name", TV_NAME);
}

const video = document.getElementById("v");
let lastUrl = "";

// 🔁 LOOP
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    console.log("DATA:", data);

    if (!data.url) return;

    if (data.url !== lastUrl) {
      video.pause();
      video.src = data.url;
      video.load();
      lastUrl = data.url;
    }

    if (data.playing) {
      video.muted = true;

      video.play().catch(err => {
        console.log("play blocked:", err);
      });
    } else {
      video.pause();
    }

  } catch (e) {
    console.log(e);
  }
}, 1200);

// 🔊 unlock sound on tap
document.body.addEventListener("click", () => {
  video.muted = false;
  video.play().catch(()=>{});
});

</script>

</body>
</html>
