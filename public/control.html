<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;font-family:sans-serif;text-align:center">

<h1>📺 TV Control Panel</h1>

<input id="url" placeholder="Paste video URL"
style="width:60%;padding:12px;border-radius:10px;border:none;">

<button onclick="add()">ADD</button>

<br><br>

<button onclick="start()">START</button>
<button onclick="play()">PLAY</button>
<button onclick="pause()">PAUSE</button>
<button onclick="next()">NEXT</button>

<h3>Playlist</h3>
<ul id="list"></ul>

<script>
const API = window.location.origin;

let playlist = [];

function add() {
  const url = document.getElementById("url").value.trim();
  if (!url) return alert("Enter URL");

  playlist.push(url);
  render(); // 🔥 IMPORTANT

  fetch(API + "/set", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ url })
  });

  document.getElementById("url").value = "";
}

function render() {
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  playlist.forEach((item, i) => {
    const li = document.createElement("li");
    li.innerText = (i+1) + ". " + item;
    ul.appendChild(li);
  });
}

// बाकी controls same
function start() {
  fetch(API + "/start", { method: "POST" });
}

function play() {
  fetch(API + "/resume", { method: "POST" });
}

function pause() {
  fetch(API + "/pause", { method: "POST" });
}

function next() {
  if (playlist.length === 0) return;

  playlist.shift(); // 🔥 remove current
  render();

  if (playlist.length > 0) {
    fetch(API + "/set", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ url: playlist[0] })
    });
  }
}
</script>

</body>
</html>
