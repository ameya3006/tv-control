<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>
</head>

<body style="margin:0; background:black; text-align:center;">

  <video id="video" width="100%" height="100%" controls autoplay></video>

<script>
const server = "https://tv-control.onrender.com";

async function loadVideo() {
    try {
        let res = await fetch(server + "/current");
        let data = await res.json();

        if (data.url) {
            let video = document.getElementById("video");

            if (video.src !== data.url) {
                video.src = data.url;
                video.play();
            }
        }
    } catch (e) {
        console.log("Error");
    }
}

setInterval(loadVideo, 2000);
loadVideo();
</script>

</body>
</html>
