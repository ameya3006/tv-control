<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";

async function sync() {
  try {
    const res = await fetch("/current");
    const data = await res.json();

    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;
      video.src = currentUrl;
      video.load();
    }

    if (data.isPlaying) {
      video.muted = false;

      video.play().catch(() => {
        video.muted = true;
        video.play().catch(()=>{});
      });

    } else {
      video.pause();
    }

  } catch (e) {
    console.log("Server not reachable");
  }
}

setInterval(sync, 1500);
</script>

</body>
</html>
