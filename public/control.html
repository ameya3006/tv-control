<!DOCTYPE html>
<html>
<head>
  <title>Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .controls {
      margin-top: 15px;
    }

    .controls button {
      width: 80px;
    }

    h3 {
      margin-top: 25px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #1e293b;
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      word-break: break-all;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>📱 TV Control Panel</h2>

  <input id="url" placeholder="Enter video URL">
  <br>
  <button onclick="add()">➕ Add</button>

  <div class="controls">
    <button onclick="start()">▶ Start</button>
    <button onclick="play()">⏯ Play</button>
    <button onclick="pause()">⏸ Pause</button>
    <button onclick="next()">⏭ Next</button>
  </div>

  <h3>🎬 Playlist</h3>
  <ul id="list"></ul>

</div>

<script>
async function add() {
  const url = document.getElementById("url").value.trim();
  if (!url) return;

  await fetch("/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });

  document.getElementById("url").value = "";
  load();
}

function start() { fetch("/start", { method: "POST" }); }
function play() { fetch("/play", { method: "POST" }); }
function pause() { fetch("/pause", { method: "POST" }); }
function next() { fetch("/next", { method: "POST" }); }

async function load() {
  const res = await fetch("/playlist");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((v, i) => {
    const li = document.createElement("li");
    li.innerText = (i + 1) + ". " + v;
    list.appendChild(li);
  });
}

load();
</script>

</body>
</html>
