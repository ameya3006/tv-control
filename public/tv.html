<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE LANDSCAPE VIDEO */
video {
  position: fixed;
  top: 50%;
  left: 50%;

  width: 100vh;
  height: 100vw;

  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;

  background: black;
}
</style>
</head>

<body>

<video id="v" autoplay playsinline></video>

<script>

const API = window.location.origin;
const video = document.getElementById("v");

// 🔥 RESET OPTION (?reset=true)
const params = new URLSearchParams(window.location.search);
if (params.get("reset")) {
  localStorage.removeItem("tv_name");
  localStorage.removeItem("tv_id");
}

// 🔥 DEVICE NAME POPUP
let TV_NAME = localStorage.getItem("tv_name");

if (!TV_NAME) {
  TV_NAME = prompt("Enter Device Name");

  if (!TV_NAME) {
    TV_NAME = "My TV";
  }

  localStorage.setItem("tv_name", TV_NAME);
}

// 🔥 UNIQUE DEVICE ID
let TV_ID = localStorage.getItem("tv_id");

if (!TV_ID) {
  TV_ID = "TV_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("tv_id", TV_ID);
}

// ❌ Disable manual control
video.controls = false;
video.addEventListener("click", e => e.preventDefault());

let lastUrl = "";

// 🔁 SERVER SYNC LOOP
setInterval(async () => {
  try {
    const res = await fetch(`${API}/video?tv=${TV_ID}&name=${encodeURIComponent(TV_NAME)}`);
    const data = await res.json();

    if (!data.url) return;

    // 🎬 Load new video
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();
      video.play().catch(()=>{});
    }

    // ▶ Server control only
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("ERR:", e);
  }
}, 1500);

</script>

</body>
</html>
