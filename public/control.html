<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:sans-serif">

<h1>TV Control</h1>

<input id="url" placeholder="Paste video URL" style="width:60%">
<button onclick="add()">ADD</button>

<p id="status"></p>

<h3>Playlist:</h3>
<ul id="list"></ul>

<script>
const API = "";

// 👉 DEBUG log function
function log(msg) {
  document.getElementById("status").innerText = msg;
  console.log(msg);
}

let playlist = [];

// 👉 ADD FUNCTION (WITH DEBUG)
function add() {
  log("ADD clicked");

  const input = document.getElementById("url");
  const url = input.value.trim();

  if (!url) {
    log("URL empty!");
    return;
  }

  log("URL = " + url);

  // 👉 push in array
  playlist.push(url);

  log("Added to playlist array");

  render();

  // 👉 send to server
  fetch(API + "/set", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ url })
  })
  .then(() => log("Sent to server"))
  .catch(err => log("Server error: " + err));

  input.value = "";
}

// 👉 RENDER FUNCTION
function render() {
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  playlist.forEach((item, i) => {
    const li = document.createElement("li");
    li.innerText = item;

    ul.appendChild(li);
  });

  log("Playlist rendered: " + playlist.length);
}
</script>

</body>
</html>
