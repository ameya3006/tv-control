<!DOCTYPE html>
<html>
<head>
  <title>TV Control Panel</title>
</head>

<body>

<h2>📱 TV Control Panel</h2>

<input id="url" placeholder="Enter video URL">
<button onclick="add()">Add</button>

<br><br>

<button onclick="start()">Start ▶</button>
<button onclick="play()">Play ▶</button>
<button onclick="pause()">Pause ⏸</button>
<button onclick="next()">Next ⏭</button>

<br><br>

<h3>📂 My Playlist</h3>
<ul id="list"></ul>

<script>

// ADD VIDEO
async function add() {
  const url = document.getElementById("url").value;

  if (!url) return;

  await fetch("/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url })
  });

  document.getElementById("url").value = "";
  load();
}

// CONTROLS
function start() { fetch("/start", { method: "POST" }); }
function play() { fetch("/play", { method: "POST" }); }
function pause() { fetch("/pause", { method: "POST" }); }
function next() { fetch("/next", { method: "POST" }); }

// LOAD PLAYLIST
async function load() {
  try {
    const res = await fetch("/playlist");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = "<li>No videos</li>";
      return;
    }

    data.forEach((v, i) => {
      const li = document.createElement("li");
      li.innerText = (i + 1) + ". " + v;
      list.appendChild(li);
    });

  } catch (e) {
    document.getElementById("list").innerHTML = "<li>Server error</li>";
  }
}

// INIT
load();

</script>

</body>
</html>
