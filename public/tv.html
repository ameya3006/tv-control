<!DOCTYPE html>
<html>
<body style="margin:0;background:black">

<video id="v" muted
style="width:100vw;height:100vh;object-fit:cover"></video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 check server
setInterval(async () => {
  const res = await fetch(API + "/video");
  const data = await res.json();

  // ❌ START नसेल तर काहीच करू नको
  if (!data.playing) {
    video.pause();
    return;
  }

  // ✅ START झाल्यावरच load + play
  if (data.url && data.url !== lastUrl) {
    video.src = data.url;
    video.load();
    video.play().catch(()=>{});
    lastUrl = data.url;
  }

}, 1000);

// 👉 AUTO NEXT
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};
</script>

</body>
</html>
