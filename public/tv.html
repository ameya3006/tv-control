<!DOCTYPE html>
<html>
<body style="margin:0;background:black">

<video id="v" muted
style="width:100vw;height:100vh;object-fit:cover"></video>

<script>
const API = "";
const video = document.getElementById("v");

let lastUrl = "";

// 🔁 server check
setInterval(async () => {
  const res = await fetch(API + "/video");
  const data = await res.json();

  // 👉 ONLY load (NO autoplay)
  if (data.url && data.url !== lastUrl) {
    video.src = data.url;
    video.load();
    lastUrl = data.url;
  }

  // 👉 PLAY only when START क्लिक
  if (data.playing) {
    video.play().catch(()=>{});
  } else {
    video.pause();
  }

}, 1000);

// 👉 AUTO NEXT (only if playing)
video.onended = () => {
  fetch(API + "/next", { method: "POST" });
};
</script>

</body>
</html>
