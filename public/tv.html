<!DOCTYPE html>
<html>
<head>
  <title>TV Screen</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    /* 🔥 TV FRAME */
    .tv {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 FORCE LANDSCAPE VIEW */
    video {
      width: 100vw;
      height: 56.25vw;  /* 16:9 ratio fix */
      max-height: 100vh;
      object-fit: cover;
      background: black;
    }
  </style>
</head>

<body>

<div class="tv">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let video = document.getElementById("video");

let playlist = [
  "https://www.w3schools.com/html/mov_bbb.mp4",
  "https://media.w3.org/2010/05/sintel/trailer.mp4",
  "https://media.w3.org/2010/05/bunny/trailer.mp4"
];

let index = 0;

function playVideo(i) {
  video.src = playlist[i];

  video.muted = false;
  video.volume = 1;

  video.play().catch(()=>{});
}

video.onended = () => {
  index++;
  if (index >= playlist.length) index = 0;
  playVideo(index);
};

playVideo(index);
</script>

</body>
</html>
