<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let lastState = false;

async function sync() {
  try {
    const res = await fetch("/video");
    const data = await res.json();

    // new video load
    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;

      video.src = currentUrl;
      video.load();

      video.play().catch(()=>{});
    }

    // play/pause control
    if (data.playing !== lastState) {
      lastState = data.playing;

      if (data.playing) {
        video.play().catch(()=>{});
      } else {
        video.pause();
      }
    }

  } catch(e) {
    console.log("error");
  }
}

// fast sync
setInterval(sync, 1500);
</script>

</body>
</html>
