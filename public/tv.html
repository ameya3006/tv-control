<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" muted playsinline></video>

<script>
const video = document.getElementById("video");

let currentUrl = "";
let lastState = false;

async function sync() {
  try {
    const res = await fetch("/video");
    const data = await res.json();

    // 🎬 load video (NO autoplay)
    if (data.url && data.url !== currentUrl) {
      currentUrl = data.url;
      video.src = currentUrl;
      video.load();

      // small trick to avoid blank
      video.pause();
    }

    // ▶ play / pause control
    if (data.playing !== lastState) {
      lastState = data.playing;

      if (data.playing) {
        video.play().then(()=>{
          console.log("playing");
        }).catch(()=>{
          console.log("play blocked");
        });
      } else {
        video.pause();
      }
    }

  } catch(e) {
    console.log("error");
  }
}

setInterval(sync, 1000);
</script>

</body>
</html>
