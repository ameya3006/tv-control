<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 🔥 FORCE LANDSCAPE VIDEO */
video {
  position: fixed;
  top: 50%;
  left: 50%;

  width: 100vh;
  height: 100vw;

  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;

  background: black;
}
</style>
</head>

<body>

<video id="v" autoplay playsinline></video>

<script>

const API = window.location.origin;
const video = document.getElementById("v");

// ❌ disable manual control
video.controls = false;
video.addEventListener("click", e => e.preventDefault());

let lastUrl = "";

// 🔁 SERVER CONTROL LOOP
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    if (!data.url) return;

    // 🎬 new video load
    if (data.url !== lastUrl) {
      lastUrl = data.url;

      video.src = data.url;
      video.load();
      video.play().catch(()=>{});
    }

    // ▶ play / pause from server only
    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log("ERR:", e);
  }
}, 1500);

</script>

</body>
</html>
