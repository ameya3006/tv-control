<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;font-family:sans-serif;text-align:center">

<h1>📺 TV Control Panel</h1>

<input id="url" placeholder="Paste video URL"
style="width:60%;padding:12px;border-radius:10px;border:none;">

<button onclick="add()">ADD</button>

<br><br>

<button onclick="start()">START</button>
<button onclick="play()">PLAY</button>
<button onclick="pause()">PAUSE</button>
<button onclick="next()">NEXT</button>

<script>
const API = window.location.origin;

function add() {
  const url = document.getElementById("url").value.trim();
  if (!url) return alert("Enter URL");

  fetch(API + "/set", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ url })
  })
  .then(() => alert("Video Added ✅"))
  .catch(() => alert("Error ❌"));

  document.getElementById("url").value = "";
}

function start() {
  fetch(API + "/start", { method: "POST" });
}

function play() {
  fetch(API + "/resume", { method: "POST" });
}

function pause() {
  fetch(API + "/pause", { method: "POST" });
}

function next() {
  fetch(API + "/next", { method: "POST" });
}
</script>

</body>
</html>
