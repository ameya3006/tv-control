<!DOCTYPE html>
<html>
<head>
  <title>TV Control</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, #0b1a2f, #0a0f1c);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    .subtitle {
      margin: 10px;
      font-size: 18px;
    }

    input {
      width: 65%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .add-btn {
      padding: 10px 15px;
      margin-left: 5px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .controls button {
      padding: 6px 12px;
      margin: 5px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .playlist {
      margin-top: 20px;
    }

    .devices {
      margin: 10px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<h1>📺 TV Control Panel</h1>

<div class="subtitle">👀 Watching: <span id="count">0</span></div>

<div class="subtitle">📱 Online Devices</div>
<div id="devices" class="devices"></div>

<br>

<input id="url" placeholder="Paste video URL">
<button class="add-btn" onclick="addVideo()">ADD</button>

<div class="controls">
  <button onclick="startVideo()">START</button>
  <button onclick="playVideo()">PLAY</button>
  <button onclick="pauseVideo()">PAUSE</button>
  <button onclick="nextVideo()">NEXT</button>
</div>

<div class="playlist">
  <h3>Playlist</h3>
  <ol id="list"></ol>
</div>

<script>

const API = window.location.origin;

// 🔁 LOAD STATUS
async function load() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    // Watching count
    document.getElementById("count").innerText = data.devices?.length || 0;

    // Devices
    const dev = document.getElementById("devices");
    dev.innerHTML = "";
    (data.devices || []).forEach(d => {
      const el = document.createElement("div");
      el.innerText = "owi device (" + d.id + ")";
      dev.appendChild(el);
    });

    // Playlist
    const list = document.getElementById("list");
    list.innerHTML = "";
    (data.playlist || []).forEach((v, i) => {
      const li = document.createElement("li");
      li.innerText = v;
      list.appendChild(li);
    });

  } catch (e) {
    console.log(e);
  }
}

setInterval(load, 2000);

// ➕ ADD
function addVideo() {
  const url = document.getElementById("url").value;
  if (!url) return;

  fetch(API + "/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });
}

// ▶ START
function startVideo() {
  fetch(API + "/start", { method: "POST" });
}

// ▶ PLAY
function playVideo() {
  fetch(API + "/resume", { method: "POST" });
}

// ⏸ PAUSE
function pauseVideo() {
  fetch(API + "/pause", { method: "POST" });
}

// ⏭ NEXT
function nextVideo() {
  fetch(API + "/next", { method: "POST" });
}

</script>

</body>
</html>
