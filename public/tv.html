<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="video"></video>

<script>
const video = document.getElementById("video");

let started = false; // 🔥 important fix

async function sync() {
  const res = await fetch("/current");
  const data = await res.json();

  // ✅ URL change only when started
  if (started && data.url && video.src !== data.url) {
    video.src = data.url;
  }

  // ✅ Play only when started
  if (started && data.isPlaying) {
    video.play().catch(() => {});
  } else {
    video.pause();
  }
}

// 🔥 USER INTERACTION REQUIRED FOR AUDIO
document.body.addEventListener("click", () => {
  started = true;
  video.muted = false;
  video.play().catch(()=>{});
});

setInterval(sync, 1500);
</script>

</body>
</html>
