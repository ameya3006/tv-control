<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:black;overflow:hidden;">

<video id="video"
playsinline
autoplay
muted
style="
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
background:black;">
</video>

<script>
let video = document.getElementById("video");

async function sync() {
    try {
        let res = await fetch("/get");
        let data = await res.json();

        if (data.url) {
            if (video.src !== data.url) {
                video.src = data.url;
                video.load();
            }

            if (data.isPlaying) {
                video.play().catch(()=>{});
            } else {
                video.pause();
            }
        }
    } catch (e) {}
}

setInterval(sync, 1000);

// 🔊 unlock audio on click
document.body.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>

</body>
</html>
