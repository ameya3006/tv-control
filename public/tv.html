<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

.video-container {
  position: fixed;
  width: 100vh;
  height: 100vw;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(90deg);
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="video-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<script>
const video = document.getElementById("video");

async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  if (data.url && video.src !== data.url) {
    video.src = data.url;
    video.load();
  }

  if (data.isPlaying) {
    video.muted = true;
    video.play().then(() => {
      setTimeout(() => video.muted = false, 1000);
    }).catch(()=>{});
  } else {
    video.pause();
  }
}

setInterval(loadState, 1000);
</script>

</body>
</html>
