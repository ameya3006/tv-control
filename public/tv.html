<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
  object-fit: cover;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");

// 🔥 current tracking
let currentUrl = "";
let isPlaying = false;

// 🔥 AUDIO UNLOCK
function unlockAudio() {
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(()=>{});
}

document.body.addEventListener("click", unlockAudio);
document.body.addEventListener("touchstart", unlockAudio);


// 🔥 SYNC LOOP (SAFE VERSION)
setInterval(async () => {
  try {
    const res = await fetch("/get");
    const data = await res.json();

    // ✅ URL change only if really different
    if (data.url && currentUrl !== data.url) {
      console.log("Loading new video:", data.url);

      currentUrl = data.url;

      video.pause();
      video.src = data.url;
      video.load();
    }

    // ✅ PLAY
    if (data.isPlaying && video.paused) {
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }

    // ✅ PAUSE
    if (!data.isPlaying && !video.paused) {
      video.pause();
    }

    isPlaying = data.isPlaying;

  } catch (err) {
    console.log("SYNC ERROR", err);
  }
}, 1000); // 🔥 slightly slower = stable


// 🔥 NEXT VIDEO (SUPER STABLE)
video.addEventListener("ended", async () => {
  console.log("Video Ended → Next");

  try {
    const res = await fetch("/next");
    const data = await res.json();

    if (!data.url) return;

    // 🔥 update tracking
    currentUrl = data.url;
    isPlaying = true;

    // 🔥 HARD RESET
    video.pause();
    video.removeAttribute("src");
    video.load();

    setTimeout(() => {
      video.src = data.url;
      video.load();

      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }, 300);

  } catch (err) {
    console.log("NEXT ERROR", err);
  }
});
</script>

</body>
</html>
