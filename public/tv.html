<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="v" controls autoplay playsinline></video>

<script>

const API = window.location.origin;
const video = document.getElementById("v");

let lastUrl = "";

// 🔥 FETCH LOOP
setInterval(async () => {
  try {
    const res = await fetch(API + "/video");
    const data = await res.json();

    console.log("DATA:", data);

    if (!data.url) return;

    if (data.url !== lastUrl) {
      lastUrl = data.url;

      // 🔥 FORCE HARD RESET
      video.pause();
      video.removeAttribute("src");
      video.load();

      setTimeout(() => {
        video.src = data.url;
        video.load();

        video.play().catch(e => console.log("play error:", e));
      }, 200);
    }

    if (data.playing) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  } catch (e) {
    console.log(e);
  }
}, 1500);

</script>

</body>
</html>
